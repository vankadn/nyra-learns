<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nyra Learns with Nana</title>
<link rel="stylesheet" href="shared/tokens.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: linear-gradient(180deg, #B3E5FC 0%, #E1F5FE 60%, #C8E6C9 100%);
    min-height: 100vh;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  h1 {
    font-family: var(--font-display);
    font-size: 2.2rem;
    color: var(--plum);
    text-shadow: 2px 3px 0 rgba(0,0,0,0.1);
    margin-bottom: 8px;
    text-align: center;
  }
  .subtitle { color: #555; margin-bottom: 40px; text-align: center; }
  .root-nav {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 360px;
  }
  .root-nav-link, .root-nav-soon {
    display: block;
    padding: 20px 24px;
    border-radius: 16px;
    font-family: var(--font-display);
    font-size: 1.2rem;
    font-weight: 700;
    text-decoration: none;
    box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    text-align: center;
  }
  .root-nav-link {
    background: var(--plum);
    color: white;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .root-nav-link:hover {
    transform: translateY(-3px);
    box-shadow: 0 7px 0 rgba(0,0,0,0.15);
  }
  .root-nav-soon {
    background: #eee;
    color: #999;
    cursor: default;
  }
  .section-heading {
    font-family: var(--font-display);
    font-size: 1.1rem;
    color: var(--ink);
    text-align: center;
    margin: 32px 0 16px;
  }
</style>
</head>
<body>
  <h1>🌟 Nyra Learns with Nana</h1>
  <p class="subtitle">Choose a subject to start learning!</p>
  <div id="root-nav"></div>
  <div id="class-links"></div>
  <script type="module">
    import { renderRootNav } from './shared/nav.js';
    import { getClassLinks } from './shared/class-links-provider.js';

    renderRootNav('root-nav');
    renderClassLinks('class-links');

    async function renderClassLinks(containerId) {
      const el = document.getElementById(containerId);
      if (!el) return;
      const links = await getClassLinks();
      if (!links.length) return;
      el.innerHTML = `
        <h2 class="section-heading">🔗 Class Links</h2>
        <nav class="root-nav">
          ${links.map(l => `<a href="${l.url}" class="root-nav-link" target="_blank" rel="noopener">${l.icon} ${l.label}</a>`).join('')}
        </nav>`;
    }
  </script>
</body>
</html>
