<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nyra Learns with Nana</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Baloo+2:wght@700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sun: #FFD54F;
    --plum: #9C27B0;
    --ink: #1A237E;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(180deg, #B3E5FC 0%, #E1F5FE 60%, #C8E6C9 100%);
    min-height: 100vh;
    color: var(--ink);
    padding-bottom: 40px;
  }

  header {
    background: linear-gradient(135deg, var(--plum), #1565C0);
    padding: 18px 20px 14px;
    text-align: center;
    border-bottom: 5px solid var(--sun);
  }

  header h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 2rem;
    color: white;
    text-shadow: 2px 3px 0 rgba(0,0,0,0.2);
    letter-spacing: 1px;
  }

  header p { color: #E3F2FD; font-size: 0.95rem; margin-top: 4px; }

  .tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 18px 16px 0;
    flex-wrap: wrap;
  }

  .tab-btn {
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    padding: 10px 20px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    font-weight: 700;
    color: white;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 0 rgba(0,0,0,0.2);
  }

  .tab-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }

  .tab-btn.active {
    transform: translateY(-3px) scale(1.06);
    box-shadow: 0 7px 0 rgba(0,0,0,0.2);
    outline: 3px solid var(--sun);
  }

  .section {
    display: none;
    padding: 20px 16px;
    max-width: 520px;
    margin: 0 auto;
    animation: popIn 0.3s ease;
  }
  .section.active { display: block; }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }

  .section-title {
    font-family: 'Baloo 2', cursive;
    font-size: 1.5rem;
    text-align: center;
    margin-bottom: 16px;
    color: var(--ink);
  }

  .tip {
    background: #E8F5E9;
    border-left: 4px solid #81C784;
    border-radius: 0 10px 10px 0;
    padding: 10px 14px;
    font-size: 0.88rem;
    color: #2E7D32;
    margin-bottom: 12px;
  }

  .rule-box {
    background: linear-gradient(135deg, #FFF9C4, #FFFDE7);
    border: 2px dashed #F9A825;
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 14px;
    font-size: 0.95rem;
    font-weight: 700;
    color: #5D4037;
  }

  /* Vowel grid */
  .vowel-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }

  .vowel-card {
    background: white;
    border-radius: 14px;
    padding: 10px 4px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.12);
    transition: transform 0.15s;
    border: 3px solid transparent;
  }
  .vowel-card:active { transform: scale(0.95); }
  .vowel-card .letter { font-family: 'Baloo 2', cursive; font-size: 2rem; line-height: 1; font-weight: 800; }
  .vowel-card .word   { font-size: 0.72rem; color: #555; margin-top: 3px; }

  /* Magic E demo */
  .magic-e-demo {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
    margin: 12px 0;
  }

  .word-transform {
    display: flex;
    align-items: center;
    gap: 8px;
    background: white;
    border-radius: 14px;
    padding: 10px 16px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    font-family: 'Baloo 2', cursive;
    font-size: 1.2rem;
    font-weight: 700;
  }

  .word-transform .arrow  { color: #999; }
  .word-transform .magic-e { font-size: 0.8em; vertical-align: super; }

  /* Word groups */
  .word-group {
    background: white;
    border-radius: 18px;
    padding: 14px 16px;
    margin-bottom: 14px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    border-left: 6px solid #ccc;
  }

  .word-group h3 { font-family: 'Baloo 2', cursive; font-size: 1.1rem; margin-bottom: 8px; color: var(--ink); }

  .word-chips { display: flex; flex-wrap: wrap; gap: 7px; }

  .chip {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #F3F4FF;
    border-radius: 50px;
    padding: 6px 14px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    border: 2px solid #C5CAE9;
    transition: background 0.15s, transform 0.1s, border-color 0.15s;
    user-select: none;
    min-width: 52px;
    text-align: center;
  }
  .chip:active { transform: scale(0.93); }

  .chip-word  { line-height: 1.3; }
  .chip-emoji { display: none; font-size: 1.8rem; line-height: 1.1; }

  .chip.flipped {
    background: var(--sun);
    border-color: #F57F17;
    padding: 4px 14px;
  }
  .chip.flipped .chip-word  { display: none; }
  .chip.flipped .chip-emoji { display: block; }

  /* Vowel team groups */
  .team-group {
    background: white;
    border-radius: 18px;
    padding: 14px 16px;
    margin-bottom: 14px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  }

  .team-label {
    display: inline-block;
    color: white;
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    border-radius: 50px;
    padding: 3px 14px;
    margin-bottom: 8px;
    font-weight: 700;
  }

  .team-sound { font-size: 0.88rem; color: #777; margin-bottom: 8px; }

  /* Quiz */
  .quiz-card {
    background: white;
    border-radius: 20px;
    padding: 22px 18px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    margin-bottom: 16px;
  }

  .quiz-question { font-family: 'Baloo 2', cursive; font-size: 1.6rem; color: var(--ink); margin-bottom: 6px; }

  .quiz-word {
    font-family: 'Baloo 2', cursive;
    font-size: 3rem;
    color: var(--plum);
    margin: 8px 0 16px;
    letter-spacing: 4px;
  }

  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .quiz-btn {
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    padding: 12px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    font-weight: 700;
    color: white;
    background: #5C6BC0;
    box-shadow: 0 4px 0 #3949AB;
    transition: transform 0.1s;
  }
  .quiz-btn:active   { transform: translateY(2px); }
  .quiz-btn.correct  { background: #43A047; box-shadow: 0 4px 0 #2E7D32; }
  .quiz-btn.wrong    { background: #E53935; box-shadow: 0 4px 0 #B71C1C; }
  .quiz-btn:disabled { opacity: 0.7; cursor: default; }

  .quiz-result { font-family: 'Baloo 2', cursive; font-size: 1.4rem; margin-top: 14px; min-height: 40px; }

  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: white;
    border-radius: 14px;
    padding: 10px 16px;
    margin-bottom: 14px;
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .score-num { font-size: 1.8rem; color: var(--plum); }

  .next-btn {
    display: block;
    width: 100%;
    margin-top: 14px;
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    padding: 13px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    font-weight: 800;
    color: white;
    background: var(--plum);
    box-shadow: 0 5px 0 #6A1B9A;
    transition: transform 0.1s;
  }
  .next-btn:active  { transform: translateY(3px); box-shadow: 0 2px 0 #6A1B9A; }
  .next-btn:disabled { opacity: 0.6; cursor: default; }

  .topic-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: white;
    border: 3px solid #ccc;
    border-radius: 16px;
    padding: 14px 16px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    user-select: none;
  }
  .topic-card:has(input:checked) { background: #F3F4FF; }
  .topic-card:active { transform: scale(0.98); }
  .topic-card input[type=checkbox] { width: 22px; height: 22px; accent-color: var(--plum); cursor: pointer; flex-shrink: 0; }
  .topic-icon { font-size: 1.5rem; }
  .topic-name { font-family: 'Baloo 2', cursive; font-size: 1.1rem; font-weight: 700; color: var(--ink); flex: 1; }
  .topic-eg   { font-size: 0.78rem; color: #888; }

  /* Worksheet */
  .ws-section-box {
    background: white;
    border-radius: 18px;
    margin-bottom: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    overflow: hidden;
  }

  .ws-section-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
  }

  .ws-sec-check-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    cursor: pointer;
    user-select: none;
  }

  .ws-sec-check-wrap input[type=checkbox] {
    width: 20px; height: 20px;
    accent-color: var(--plum);
    cursor: pointer;
    flex-shrink: 0;
  }

  .ws-color-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .ws-section-name {
    font-family: 'Baloo 2', cursive;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--ink);
  }

  .ws-expand-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    color: #aaa;
    padding: 4px 8px;
    line-height: 1;
    transition: transform 0.2s;
  }

  .ws-expand-btn.open { transform: rotate(90deg); }

  .ws-items-list {
    padding: 6px 16px 12px 48px;
    border-top: 1px solid #f0f0f0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .ws-items-list[hidden] { display: none; }

  .ws-item-label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 0.92rem;
    font-weight: 600;
    color: #555;
    user-select: none;
  }

  .ws-item-label input[type=checkbox] {
    width: 17px; height: 17px;
    accent-color: var(--plum);
    cursor: pointer;
  }

  .ws-count-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: white;
    border-radius: 14px;
    padding: 12px 16px;
    margin: 14px 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
  }

  .ws-count-row input[type=number] {
    width: 68px;
    padding: 6px 8px;
    border: 2px solid #C5CAE9;
    border-radius: 10px;
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--ink);
    text-align: center;
  }

  .ws-status {
    text-align: center;
    font-family: 'Baloo 2', cursive;
    font-size: 0.95rem;
    font-weight: 700;
    margin-top: 10px;
    min-height: 22px;
    color: #E53935;
  }

  /* ── Level filtering ── */
  .chip[data-level="medium"],
  .chip[data-level="hard"]                              { display: none; }
  .word-group.show-medium  .chip[data-level="medium"],
  .team-group.show-medium  .chip[data-level="medium"]   { display: inline-flex; }

  .show-more-btn {
    display: inline-block;
    margin-top: 6px;
    font-family: 'Baloo 2', cursive;
    font-size: 0.78rem;
    background: #EDE7F6;
    border: 2px solid #B39DDB;
    border-radius: 50px;
    padding: 3px 14px;
    cursor: pointer;
    font-weight: 700;
    color: #4527A0;
    transition: background 0.15s;
  }
  .show-more-btn:hover { background: #D1C4E9; }

  .item-note {
    font-size: 0.8rem;
    color: #7B1FA2;
    background: #F3E5F5;
    border-radius: 8px;
    padding: 4px 8px;
    margin-bottom: 6px;
  }
  .item-rule {
    font-size: 0.8rem;
    color: #BF360C;
    background: #FFF3E0;
    border-radius: 8px;
    padding: 4px 8px;
    margin-bottom: 6px;
    font-weight: 700;
  }

  /* ── Quiz level picker ── */
  .level-pick-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin: 10px 0;
    background: #F5F5F5;
    border-radius: 12px;
    padding: 8px 12px;
  }
  .level-pick-row > span { font-family: 'Baloo 2', cursive; font-size: 0.9rem; font-weight: 700; color: var(--ink); }
  .lvl-btn {
    font-family: 'Baloo 2', cursive;
    font-size: 0.85rem;
    padding: 5px 14px;
    border-radius: 50px;
    border: 2px solid #ddd;
    background: white;
    cursor: pointer;
    font-weight: 700;
    color: #888;
    transition: all 0.15s;
  }
  .lvl-btn.on-easy   { background: #C8E6C9; border-color: #43A047; color: #1B5E20; }
  .lvl-btn.on-medium { background: #FFF9C4; border-color: #F9A825; color: #5D4037; }
  .lvl-btn.on-hard   { background: #FFCDD2; border-color: #E53935; color: #B71C1C; }

  /* ── Worksheet level row ── */
  .ws-level-row {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    background: white;
    border-radius: 14px;
    padding: 10px 16px;
    margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    font-family: 'Baloo 2', cursive;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--ink);
  }
  .ws-level-cb-label {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.88rem;
    user-select: none;
  }
  .ws-level-cb-label input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--plum); cursor: pointer; }

  /* ── Teacher notes ── */
  .tn-btn {
    font-family: 'Baloo 2', cursive;
    font-size: 0.72rem;
    background: #E8EAF6;
    border: 1.5px solid #9FA8DA;
    border-radius: 20px;
    padding: 2px 10px;
    cursor: pointer;
    font-weight: 700;
    color: #3949AB;
    margin-left: 8px;
    vertical-align: middle;
    transition: background 0.15s;
  }
  .tn-btn:hover, .tn-btn.open { background: #C5CAE9; }

  .tn-panel {
    margin-top: 8px;
    background: #F0F4FF;
    border: 1.5px dashed #9FA8DA;
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 0.82rem;
    color: #37474F;
    line-height: 1.55;
  }
  .tn-panel[hidden] { display: none; }
  .tn-field { margin-bottom: 4px; }
  .tn-field:last-child { margin-bottom: 0; }
  .tn-label { font-weight: 700; color: #3949AB; margin-right: 3px; }

  .team-group-head {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .team-group-head .team-label { margin-bottom: 0; }

  /* ── Worksheet notes checkbox ── */
  .ws-notes-row {
    display: flex;
    align-items: center;
    background: white;
    border-radius: 14px;
    padding: 10px 16px;
    margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .ws-notes-row label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-family: 'Baloo 2', cursive;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--ink);
    user-select: none;
  }
  .ws-notes-row input[type=checkbox] { width: 17px; height: 17px; accent-color: var(--plum); cursor: pointer; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<header>
  <h1>🌟 Nyra Learns with Nana</h1>
  <p>Tap words to hear them · double-tap to flip! 🎉</p>
</header>

<div class="tabs" id="tabBar"></div>
<div id="content"></div>

<script>
const DEFAULT_EMOJI = '📖';
let DATA = null;
let currentQ = 0, score = 0, total = 0, answered = false, shuffledQuiz = [];

function getEmoji(wordObj, item, sec) {
  if (wordObj && wordObj.emoji) return wordObj.emoji;
  if (item && item.defaultEmoji) return item.defaultEmoji;
  if (sec && sec.defaultEmoji) return sec.defaultEmoji;
  return DEFAULT_EMOJI;
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.8; u.pitch = 1.2;
  window.speechSynthesis.speak(u);
}

function setupChipListeners(container) {
  container.querySelectorAll('.word-chips').forEach(group => {
    let clickTimer = null;

    group.addEventListener('click', e => {
      const chip = e.target.closest('.chip');
      if (!chip) return;
      clearTimeout(clickTimer);
      clickTimer = setTimeout(() => {
        if (chip.classList.contains('flipped')) {
          chip.classList.remove('flipped');
        }
        speak(chip.dataset.word);
      }, 200);
    });

    group.addEventListener('dblclick', e => {
      const chip = e.target.closest('.chip');
      if (!chip) return;
      e.preventDefault();
      clearTimeout(clickTimer);
      chip.classList.add('flipped');
    });
  });
}

function showTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const sec = document.getElementById('sec-' + id);
  if (sec) sec.classList.add('active');
  const btn = document.getElementById('btn-' + id);
  if (btn) btn.classList.add('active');
}

function renderChip(wordObj, item, sec) {
  const emoji = getEmoji(wordObj, item, sec);
  const w = wordObj.word.replace(/"/g, '&quot;');
  const e = emoji.replace(/"/g, '&quot;');
  const level = wordObj.level || 'easy';
  return `<span class="chip" data-word="${w}" data-emoji="${e}" data-level="${level}">` +
    `<span class="chip-word">${wordObj.word}</span>` +
    `<span class="chip-emoji">${emoji}</span>` +
    `</span>`;
}

function setupShowMore(container) {
  container.querySelectorAll('.word-group, .team-group').forEach(group => {
    const medChips = group.querySelectorAll('.chip[data-level="medium"]');
    if (medChips.length === 0) return;
    const btn = document.createElement('button');
    btn.className = 'show-more-btn';
    btn.textContent = `+ ${medChips.length} more`;
    btn.addEventListener('click', () => {
      const showing = group.classList.toggle('show-medium');
      btn.textContent = showing ? '▲ show less' : `+ ${medChips.length} more`;
    });
    group.querySelector('.word-chips').after(btn);
  });
}

function renderTeacherNotesHTML(item) {
  const tn = item.teacherNotes;
  if (!tn) return { btn: '', panel: '' };
  const fields = [
    ['🗣️', 'How to say it', tn.howToSay],
    ['📏', 'Rule', tn.simpleRule],
    ['🇮🇳', 'Indian English tip', tn.indianDadTip],
    ['⚠️', 'Watch out', tn.commonMistake],
    ['💬', 'Example', tn.exampleSentence],
  ].filter(([,,v]) => v);
  if (!fields.length) return { btn: '', panel: '' };
  const panelId = `tn-${item.id}`;
  const btn = `<button class="tn-btn" data-panel="${panelId}">📋 Notes</button>`;
  const panel = `<div class="tn-panel" id="${panelId}" hidden>` +
    fields.map(([icon, label, val]) =>
      `<div class="tn-field"><span class="tn-label">${icon} ${label}:</span> ${val}</div>`
    ).join('') +
    `</div>`;
  return { btn, panel };
}

function setupTeacherNotes(container) {
  container.querySelectorAll('.tn-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const panel = document.getElementById(btn.dataset.panel);
      if (!panel) return;
      const isHidden = panel.hasAttribute('hidden');
      if (isHidden) {
        panel.removeAttribute('hidden');
        btn.classList.add('open');
        btn.textContent = '📋 ▲';
      } else {
        panel.setAttribute('hidden', '');
        btn.classList.remove('open');
        btn.textContent = '📋 Notes';
      }
    });
  });
}

function renderVowelSection(sec) {
  const div = document.createElement('div');
  div.id = 'sec-' + sec.id;
  div.className = 'section';

  let html = `<div class="section-title">${sec.icon} ${sec.title}</div>`;

  if (sec.tip) html += `<div class="tip">📣 ${sec.tip}</div>`;

  if (sec.vowels) {
    html += `<div class="vowel-grid">`;
    for (const v of sec.vowels) {
      html += `<div class="vowel-card" onclick="speak('${v.speak}')">
        <div class="letter" style="color:${sec.color}">${v.letter}</div>
        <div class="word">${v.example}</div>
      </div>`;
    }
    html += `</div>`;
  }

  if (sec.rule) html += `<div class="rule-box"><span>✨</span> ${sec.rule}</div>`;

  if (sec.transforms) {
    html += `<div class="magic-e-demo">`;
    for (const t of sec.transforms) {
      const base = t.after.slice(0, -1);
      html += `<div class="word-transform">
        <span style="color:${DATA.sections[0].color}">${t.before}</span>
        <span class="arrow">→</span>
        <span style="color:${sec.color}">${base}<span class="magic-e" style="color:#F06292">e</span></span>
      </div>`;
    }
    html += `</div>`;
  }

  for (const item of sec.items) {
    const groupEmoji = item.defaultEmoji || sec.defaultEmoji || DEFAULT_EMOJI;
    const { btn: tnBtn, panel: tnPanel } = renderTeacherNotesHTML(item);
    html += `<div class="word-group" style="border-left-color:${sec.color}">
      <h3>${groupEmoji} ${item.label}${tnBtn}</h3>`;
    if (item.rule) html += `<div class="item-rule">📌 ${item.rule}</div>`;
    if (item.note) html += `<div class="item-note">💡 ${item.note}</div>`;
    html += `<div class="word-chips">`;
    for (const wordObj of item.words) {
      html += renderChip(wordObj, item, sec);
    }
    html += `</div>${tnPanel}</div>`;
  }

  div.innerHTML = html;
  setupChipListeners(div);
  setupShowMore(div);
  setupTeacherNotes(div);
  return div;
}

function renderTeamsSection(sec) {
  const div = document.createElement('div');
  div.id = 'sec-' + sec.id;
  div.className = 'section';

  let html = `<div class="section-title">${sec.icon} ${sec.title}</div>`;
  if (sec.tip) html += `<div class="tip">🤝 ${sec.tip}</div>`;

  for (const item of sec.items) {

    html += `<div class="team-group">
      <div class="team-group-head">
        <div class="team-label" style="background:${sec.color}">${item.label}</div>${tnBtn}
      </div>
      <div class="team-sound">👉 ${item.sound}</div>`;
    if (item.note) html += `<div class="item-note">💡 ${item.note}</div>`;
    html += `<div class="word-chips">`;
    for (const wordObj of item.words) {
      html += renderChip(wordObj, item, sec);
    }
    html += `</div>${tnPanel}</div>`;
  }

  div.innerHTML = html;
  setupChipListeners(div);
  setupShowMore(div);
  setupTeacherNotes(div);
  return div;
}

function buildQuizData(sections) {
  const titles = sections.map(s => s.title);
  const qs = [];
  for (const sec of sections) {
    for (const item of sec.items) {
      for (const wObj of item.words) {
        const wrong = shuffle(titles.filter(t => t !== sec.title)).slice(0, 3);
        qs.push({
          topic: sec.id,
          level: wObj.level || 'easy',
          word: wObj.word,
          answer: sec.title,
          options: shuffle([sec.title, ...wrong])
        });
      }
    }
  }
  return qs;
}

function renderQuizSection(quizData, sections) {
  const div = document.createElement('div');
  div.id = 'sec-quiz';
  div.className = 'section';

  let html = `<div class="section-title">⭐ Quiz Time!</div>
  <div id="quizSetup">
    <div class="tip">👆 Pick what you want to practice today!</div>
    <div style="display:grid;gap:10px;margin-bottom:4px;">`;

  for (const sec of sections) {
    const eg = sec.items.slice(0, 3).flatMap(i => i.words.slice(0, 2).map(w => w.word)).join(', ');
    html += `<label class="topic-card" style="border-color:${sec.color}">
      <input type="checkbox" class="quiz-topic-cb" value="${sec.id}" checked>
      <span class="topic-icon">${sec.icon}</span>
      <span class="topic-name">${sec.title}</span>
      <span class="topic-eg">${eg}</span>
    </label>`;
  }

  html += `</div>
    <div class="level-pick-row">
      <span>Level:</span>
      <button class="lvl-btn on-easy"  data-level="easy">⭐ Easy</button>
      <button class="lvl-btn"          data-level="medium">⭐⭐ Medium</button>
      <button class="lvl-btn"          data-level="hard">⭐⭐⭐ Hard</button>
    </div>
    <button class="next-btn" id="startQuizBtn">▶️ Start Quiz!</button>
    <div id="topicWarning" style="color:#E53935;font-weight:700;text-align:center;margin-top:8px;display:none;">Please pick at least one topic and level! 🙏</div>
  </div>

  <div id="quizPlay" style="display:none;">
    <div class="score-bar">
      <span>⭐ Score</span>
      <span class="score-num" id="scoreDisplay">0</span>
      <span>/ <span id="totalDisplay">0</span></span>
      <button id="changeTopicsBtn" style="font-family:'Baloo 2',cursive;background:#90CAF9;border:none;padding:6px 12px;border-radius:20px;cursor:pointer;font-weight:700;">⬅️ Change</button>
    </div>
    <div class="quiz-card">
      <div class="quiz-question">Which group does this word belong to?</div>
      <div class="quiz-word" id="quizWord"></div>
      <div class="quiz-options" id="quizOptions"></div>
      <div class="quiz-result" id="quizResult"></div>
    </div>
    <button class="next-btn" id="nextQuizBtn">Next Word ➡️</button>
  </div>`;

  div.innerHTML = html;

  div.querySelectorAll('.lvl-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const classMap = { easy: 'on-easy', medium: 'on-medium', hard: 'on-hard' };
      btn.classList.toggle(classMap[btn.dataset.level]);
    });
  });

  div.querySelector('#startQuizBtn').addEventListener('click', () => startQuiz(quizData));
  div.querySelector('#changeTopicsBtn').addEventListener('click', backToSetup);
  div.querySelector('#nextQuizBtn').addEventListener('click', nextQuestion);

  return div;
}

function shuffle(arr) { return arr.slice().sort(() => Math.random() - 0.5); }

function getSelectedTopics() {
  return Array.from(document.querySelectorAll('.quiz-topic-cb:checked')).map(cb => cb.value);
}

function getSelectedLevels() {
  const map = { 'on-easy': 'easy', 'on-medium': 'medium', 'on-hard': 'hard' };
  const levels = [];
  document.querySelectorAll('.lvl-btn').forEach(btn => {
    for (const [cls, lvl] of Object.entries(map)) {
      if (btn.classList.contains(cls)) levels.push(lvl);
    }
  });
  return levels;
}

function startQuiz(quizData) {
  const topics = getSelectedTopics();
  const levels = getSelectedLevels();
  if (topics.length === 0 || levels.length === 0) {
    document.getElementById('topicWarning').style.display = 'block';
    return;
  }
  document.getElementById('topicWarning').style.display = 'none';
  shuffledQuiz = shuffle(quizData.filter(q => topics.includes(q.topic) && levels.includes(q.level)));
  if (shuffledQuiz.length === 0) {
    document.getElementById('topicWarning').style.display = 'block';
    document.getElementById('topicWarning').textContent = 'No words found for this combo — try adding more levels!';
    return;
  }
  currentQ = 0; score = 0; total = 0; answered = false;
  updateScore();
  document.getElementById('quizSetup').style.display = 'none';
  document.getElementById('quizPlay').style.display = 'block';
  renderQuestion();
}

function backToSetup() {
  document.getElementById('quizSetup').style.display = 'block';
  document.getElementById('quizPlay').style.display = 'none';
}

function renderQuestion() {
  if (currentQ >= shuffledQuiz.length) currentQ = 0;
  const q = shuffledQuiz[currentQ];
  document.getElementById('quizWord').textContent = q.word;
  document.getElementById('quizResult').textContent = '';
  speak(q.word);
  answered = false;

  const container = document.getElementById('quizOptions');
  container.innerHTML = '';
  shuffle(q.options).forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => checkAnswer(btn, opt, q.answer, container));
    container.appendChild(btn);
  });
}

function checkAnswer(btn, chosen, correct, container) {
  if (answered) return;
  answered = true;
  total++;
  container.querySelectorAll('.quiz-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
  });
  const result = document.getElementById('quizResult');
  if (chosen === correct) {
    score++;
    btn.classList.add('correct');
    result.textContent = '🎉 Wah, correct! Shabash! 🌟';
    speak('Correct! Great job!');
  } else {
    btn.classList.add('wrong');
    result.textContent = 'Oops! It is ' + correct + '. Try again!';
    speak('The answer is ' + correct);
  }
  updateScore();
}

function nextQuestion() { currentQ++; renderQuestion(); }

function updateScore() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('totalDisplay').textContent = total;
}

  for (const sec of sections) {

    <label class="ws-level-cb-label"><input type="checkbox" class="ws-level-cb" value="medium" checked> ⭐⭐ Medium</label>

    </label>

  div.innerHTML = html;

  div.querySelectorAll('.ws-expand-btn').forEach(btn => {

    }

  return div;

// ── PDF emoji helpers ───────────────────────────────────────────────────────

const _emojiCache = new Map();

function emojiToTwemojiUrl(emoji) {
  const cps = [];
  for (let i = 0; i < emoji.length; ) {
    const cp = emoji.codePointAt(i);
    if (cp !== 0xFE0F) cps.push(cp.toString(16));
    i += cp > 0xFFFF ? 2 : 1;
  }
  return `https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/${cps.join('-')}.png`;
}

async function loadEmojiImage(emoji) {
  if (_emojiCache.has(emoji)) return _emojiCache.get(emoji);
  try {
    const res = await fetch(emojiToTwemojiUrl(emoji));
    if (!res.ok) { _emojiCache.set(emoji, null); return null; }
    const blob = await res.blob();
    const dataUrl = await new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onload = () => resolve(fr.result);
      fr.onerror = reject;
      fr.readAsDataURL(blob);
    });
    _emojiCache.set(emoji, dataUrl);
    return dataUrl;
  } catch {
    _emojiCache.set(emoji, null);
    return null;
  }
}

// ── PDF generation ──────────────────────────────────────────────────────────

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

async function generateWorksheetPDF(sections) {
  const statusEl = document.getElementById('wsStatus');
  if (!window.jspdf) {
    statusEl.textContent = 'PDF library not loaded — please try again in a moment.';
    return;
  }
  statusEl.textContent = '';

  const wordCount = Math.max(1, parseInt(document.getElementById('wsWordCount').value, 10) || 25);
  const selectedLevels = Array.from(document.querySelectorAll('.ws-level-cb:checked')).map(cb => cb.value);
  const includeNotes = document.getElementById('wsIncludeNotes').checked;

  // Build render blocks: per-item (with tn) when notes on, per-section when off
  const renderBlocks = [];

  for (const sec of sections) {
    const checkedItems = Array.from(
      document.querySelectorAll(`.ws-item-cb[data-sec="${sec.id}"]:checked`)
    ).map(cb => cb.dataset.item);
    if (checkedItems.length === 0) continue;

    if (includeNotes) {
      for (const item of sec.items) {
        if (!checkedItems.includes(item.id)) continue;
        let words = item.words
          .filter(w => !selectedLevels.length || selectedLevels.includes(w.level || 'easy'))
          .map(w => ({ word: w.word, emoji: getEmoji(w, item, sec) }));
        if (!words.length) continue;
        words = shuffle(words).slice(0, wordCount);
        renderBlocks.push({ label: item.label, rgb: hexToRgb(sec.color), words, tn: item.teacherNotes || null });
      }
    } else {
      let words = [];
      for (const item of sec.items) {
        if (checkedItems.includes(item.id)) {
          for (const wObj of item.words) {
            if (!selectedLevels.length || selectedLevels.includes(wObj.level || 'easy')) {
              words.push({ word: wObj.word, emoji: getEmoji(wObj, item, sec) });
            }
          }
        }
      }
      if (!words.length) continue;
      words = shuffle(words).slice(0, wordCount);
      renderBlocks.push({ label: sec.title, rgb: hexToRgb(sec.color), words, tn: null });
    }
  }

  if (renderBlocks.length === 0) {
    statusEl.textContent = 'Please select at least one category!';
    return;
  }

  // Pre-fetch emoji images
  statusEl.textContent = 'Loading emoji…';
  const allEmoji = [...new Set(renderBlocks.flatMap(b => b.words.map(w => w.emoji)))];
  await Promise.all(allEmoji.map(e => loadEmojiImage(e)));
  statusEl.textContent = '';

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'letter', orientation: 'portrait' });

  const pageW = 215.9, pageH = 279.4;
  const mL = 15, mT = 20, mB = 15;
  const workW = pageW - mL * 2;
  const cols = 4;
  const gapX = 3;
  const cellW = (workW - gapX * (cols - 1)) / cols;
  const cellH = 26;
  const gapY = 3;
  const hdrH = 9;
  const emojiSz = 9;

  // Title block
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(16);
  doc.text("Nyra's Spelling Worksheet", pageW / 2, mT, { align: 'center' });
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  const today = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  doc.text(today, pageW / 2, mT + 6, { align: 'center' });
  doc.setFontSize(9);
  doc.setTextColor(130, 130, 130);
  doc.text('Name: _________________________', mL, mT + 13);
  doc.setTextColor(0, 0, 0);

  let y = mT + 20;

  for (const { label, rgb, words, tn } of renderBlocks) {
    const [rr, gg, bb] = rgb;

    // Compute notes box height upfront so we can keep header+notes+first-row together
    let notesBoxH = 0;
    let rendNoteLines = null;
    if (tn) {
      const noteFields = [
        ['Rule', tn.simpleRule],
        ['Indian tip', tn.indianDadTip],
        ['Watch out', tn.commonMistake],
      ].filter(([, v]) => v);
      if (noteFields.length > 0) {
        const nFontSz = 7.5, nLH = 4, nPadV = 2.5, nPadH = 3;
        doc.setFontSize(nFontSz);
        rendNoteLines = noteFields.map(([lbl, txt]) => ({
          label: lbl + ':',
          body: doc.splitTextToSize(txt, workW - nPadH * 2 - 10),
        }));
        const totalL = rendNoteLines.reduce((s, r) => s + 1 + r.body.length, 0);
        notesBoxH = nPadV * 2 + totalL * nLH + 3;
      }
    }

    if (y + hdrH + notesBoxH + cellH + gapY > pageH - mB) {
      doc.addPage();
      y = mT;
    }

    // Section/item header
    doc.setFillColor(rr, gg, bb);
    doc.roundedRect(mL, y, workW, hdrH, 2, 2, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    doc.text(label, mL + 4, y + hdrH * 0.68);
    doc.setTextColor(0, 0, 0);
    y += hdrH + 2;

    // Teacher notes box
    if (rendNoteLines) {
      const nFontSz = 7.5, nLH = 4, nPadV = 2.5, nPadH = 3;
      const totalL = rendNoteLines.reduce((s, r) => s + 1 + r.body.length, 0);
      const boxH = nPadV * 2 + totalL * nLH;

      doc.setFillColor(242, 245, 255);
      doc.setDrawColor(140, 160, 200);
      doc.setLineWidth(0.25);
      doc.rect(mL, y, workW, boxH, 'FD');

      let cy = y + nPadV + nLH * 0.82;
      doc.setFontSize(nFontSz);
      for (const { label: lbl, body } of rendNoteLines) {
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(60, 80, 160);
        doc.text(lbl, mL + nPadH, cy);
        cy += nLH;
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(40, 40, 50);
        for (const line of body) {
          doc.text(line, mL + nPadH + 8, cy);
          cy += nLH;
        }
      }
      y += boxH + 3;
    }

    // Word grid
    const rowCount = Math.ceil(words.length / cols);
    for (let row = 0; row < rowCount; row++) {
      if (y + cellH > pageH - mB) {
        doc.addPage();
        y = mT;
      }
      for (let col = 0; col < cols; col++) {
        const idx = row * cols + col;
        if (idx >= words.length) break;
        const { word, emoji } = words[idx];
        const x = mL + col * (cellW + gapX);

        const imgData = _emojiCache.get(emoji);
        if (imgData) {
          const ex = x + (cellW - emojiSz) / 2;
          doc.addImage(imgData, 'PNG', ex, y + 1, emojiSz, emojiSz);
        }

        doc.setFont('helvetica', 'bold');
        doc.setFontSize(11);
        doc.setTextColor(20, 20, 20);
        doc.text(word, x + 2, y + 15);

        doc.setDrawColor(185, 185, 185);
        doc.setLineWidth(0.3);
        doc.line(x + 2, y + 22, x + cellW - 2, y + 22);
      }
      y += cellH + gapY;
    }
    y += 5;
  }

  const dateStr = new Date().toISOString().slice(0, 10);
  doc.save(`Nyra-Worksheet-${dateStr}.pdf`);
}

// ── Init ────────────────────────────────────────────────────────────────────

async function init() {
  const res = await fetch('data/vowels.json');
  DATA = await res.json();

  const tabBar = document.getElementById('tabBar');
  const content = document.getElementById('content');

  DATA.sections.forEach((sec, i) => {
    const btn = document.createElement('button');
    btn.id = 'btn-' + sec.id;
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.style.background = sec.color;
    btn.textContent = sec.icon + ' ' + sec.title;
    btn.addEventListener('click', () => showTab(sec.id));
    tabBar.appendChild(btn);

    let secEl;
    if (sec.items && sec.items[0] && sec.items[0].sound !== undefined) {
      secEl = renderTeamsSection(sec);
    } else {
      secEl = renderVowelSection(sec);
    }
    if (i === 0) secEl.classList.add('active');
    content.appendChild(secEl);
  });

  const quizBtn = document.createElement('button');
  quizBtn.id = 'btn-quiz';
  quizBtn.className = 'tab-btn';
  quizBtn.style.background = '#E65100';
  quizBtn.textContent = '⭐ Quiz!';
  quizBtn.addEventListener('click', () => showTab('quiz'));
  tabBar.appendChild(quizBtn);

  content.appendChild(renderQuizSection(buildQuizData(DATA.sections), DATA.sections));

  const wsBtn = document.createElement('button');
  wsBtn.id = 'btn-worksheet';
  wsBtn.className = 'tab-btn';
  wsBtn.style.background = '#2E7D32';
  wsBtn.textContent = 'Worksheet';
  wsBtn.addEventListener('click', () => showTab('worksheet'));
  tabBar.appendChild(wsBtn);

  content.appendChild(renderWorksheetSection(DATA.sections));
}

init();
