<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nyra Learns with Nana</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Baloo+2:wght@700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sun: #FFD54F;
    --plum: #9C27B0;
    --ink: #1A237E;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(180deg, #B3E5FC 0%, #E1F5FE 60%, #C8E6C9 100%);
    min-height: 100vh;
    color: var(--ink);
    padding-bottom: 40px;
  }

  header {
    background: linear-gradient(135deg, var(--plum), #1565C0);
    padding: 18px 20px 14px;
    text-align: center;
    border-bottom: 5px solid var(--sun);
  }

  header h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 2rem;
    color: white;
    text-shadow: 2px 3px 0 rgba(0,0,0,0.2);
    letter-spacing: 1px;
  }

  header p { color: #E3F2FD; font-size: 0.95rem; margin-top: 4px; }

  .tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 18px 16px 0;
    flex-wrap: wrap;
  }

  .tab-btn {
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    padding: 10px 20px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    font-weight: 700;
    color: white;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 0 rgba(0,0,0,0.2);
  }

  .tab-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }

  .tab-btn.active {
    transform: translateY(-3px) scale(1.06);
    box-shadow: 0 7px 0 rgba(0,0,0,0.2);
    outline: 3px solid var(--sun);
  }

  .section {
    display: none;
    padding: 20px 16px;
    max-width: 520px;
    margin: 0 auto;
    animation: popIn 0.3s ease;
  }
  .section.active { display: block; }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }

  .section-title {
    font-family: 'Baloo 2', cursive;
    font-size: 1.5rem;
    text-align: center;
    margin-bottom: 16px;
    color: var(--ink);
  }

  .tip {
    background: #E8F5E9;
    border-left: 4px solid #81C784;
    border-radius: 0 10px 10px 0;
    padding: 10px 14px;
    font-size: 0.88rem;
    color: #2E7D32;
    margin-bottom: 12px;
  }

  .rule-box {
    background: linear-gradient(135deg, #FFF9C4, #FFFDE7);
    border: 2px dashed #F9A825;
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 14px;
    font-size: 0.95rem;
    font-weight: 700;
    color: #5D4037;
  }

  /* Vowel grid */
  .vowel-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }

  .vowel-card {
    background: white;
    border-radius: 14px;
    padding: 10px 4px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.12);
    transition: transform 0.15s;
    border: 3px solid transparent;
  }
  .vowel-card:active { transform: scale(0.95); }
  .vowel-card .letter { font-family: 'Baloo 2', cursive; font-size: 2rem; line-height: 1; font-weight: 800; }
  .vowel-card .word   { font-size: 0.72rem; color: #555; margin-top: 3px; }

  /* Magic E demo */
  .magic-e-demo {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
    margin: 12px 0;
  }

  .word-transform {
    display: flex;
    align-items: center;
    gap: 8px;
    background: white;
    border-radius: 14px;
    padding: 10px 16px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    font-family: 'Baloo 2', cursive;
    font-size: 1.2rem;
    font-weight: 700;
  }

  .word-transform .arrow  { color: #999; }
  .word-transform .magic-e { font-size: 0.8em; vertical-align: super; }

  /* Word groups */
  .word-group {
    background: white;
    border-radius: 18px;
    padding: 14px 16px;
    margin-bottom: 14px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    border-left: 6px solid #ccc;
  }

  .word-group h3 { font-family: 'Baloo 2', cursive; font-size: 1.1rem; margin-bottom: 8px; color: var(--ink); }

  .word-chips { display: flex; flex-wrap: wrap; gap: 7px; }

  .chip {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #F3F4FF;
    border-radius: 50px;
    padding: 6px 14px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    border: 2px solid #C5CAE9;
    transition: background 0.15s, transform 0.1s, border-color 0.15s;
    user-select: none;
    min-width: 52px;
    text-align: center;
  }
  .chip:active { transform: scale(0.93); }

  .chip-word  { line-height: 1.3; }
  .chip-emoji { display: none; font-size: 1.8rem; line-height: 1.1; }

  .chip.flipped {
    background: var(--sun);
    border-color: #F57F17;
    padding: 4px 14px;
  }
  .chip.flipped .chip-word  { display: none; }
  .chip.flipped .chip-emoji { display: block; }

  /* Vowel team groups */
  .team-group {
    background: white;
    border-radius: 18px;
    padding: 14px 16px;
    margin-bottom: 14px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  }

  .team-label {
    display: inline-block;
    color: white;
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    border-radius: 50px;
    padding: 3px 14px;
    margin-bottom: 8px;
    font-weight: 700;
  }

  .team-sound { font-size: 0.88rem; color: #777; margin-bottom: 8px; }

  /* Quiz */
  .quiz-card {
    background: white;
    border-radius: 20px;
    padding: 22px 18px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    margin-bottom: 16px;
  }

  .quiz-question { font-family: 'Baloo 2', cursive; font-size: 1.6rem; color: var(--ink); margin-bottom: 6px; }

  .quiz-word {
    font-family: 'Baloo 2', cursive;
    font-size: 3rem;
    color: var(--plum);
    margin: 8px 0 16px;
    letter-spacing: 4px;
  }

  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .quiz-btn {
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    padding: 12px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    font-weight: 700;
    color: white;
    background: #5C6BC0;
    box-shadow: 0 4px 0 #3949AB;
    transition: transform 0.1s;
  }
  .quiz-btn:active   { transform: translateY(2px); }
  .quiz-btn.correct  { background: #43A047; box-shadow: 0 4px 0 #2E7D32; }
  .quiz-btn.wrong    { background: #E53935; box-shadow: 0 4px 0 #B71C1C; }
  .quiz-btn:disabled { opacity: 0.7; cursor: default; }

  .quiz-result { font-family: 'Baloo 2', cursive; font-size: 1.4rem; margin-top: 14px; min-height: 40px; }

  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: white;
    border-radius: 14px;
    padding: 10px 16px;
    margin-bottom: 14px;
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .score-num { font-size: 1.8rem; color: var(--plum); }

  .next-btn {
    display: block;
    width: 100%;
    margin-top: 14px;
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    padding: 13px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    font-weight: 800;
    color: white;
    background: var(--plum);
    box-shadow: 0 5px 0 #6A1B9A;
    transition: transform 0.1s;
  }
  .next-btn:active  { transform: translateY(3px); box-shadow: 0 2px 0 #6A1B9A; }
  .next-btn:disabled { opacity: 0.6; cursor: default; }

  .topic-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: white;
    border: 3px solid #ccc;
    border-radius: 16px;
    padding: 14px 16px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    user-select: none;
  }
  .topic-card:has(input:checked) { background: #F3F4FF; }
  .topic-card:active { transform: scale(0.98); }
  .topic-card input[type=checkbox] { width: 22px; height: 22px; accent-color: var(--plum); cursor: pointer; flex-shrink: 0; }
  .topic-icon { font-size: 1.5rem; }
  .topic-name { font-family: 'Baloo 2', cursive; font-size: 1.1rem; font-weight: 700; color: var(--ink); flex: 1; }
  .topic-eg   { font-size: 0.78rem; color: #888; }

  /* Worksheet */
  .ws-section-box {
    background: white;
    border-radius: 18px;
    margin-bottom: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    overflow: hidden;
  }

  .ws-section-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
  }

  .ws-sec-check-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    cursor: pointer;
    user-select: none;
  }

  .ws-sec-check-wrap input[type=checkbox] {
    width: 20px; height: 20px;
    accent-color: var(--plum);
    cursor: pointer;
    flex-shrink: 0;
  }

  .ws-color-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .ws-section-name {
    font-family: 'Baloo 2', cursive;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--ink);
  }

  .ws-expand-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    color: #aaa;
    padding: 4px 8px;
    line-height: 1;
    transition: transform 0.2s;
  }

  .ws-expand-btn.open { transform: rotate(90deg); }

  .ws-items-list {
    padding: 6px 16px 12px 48px;
    border-top: 1px solid #f0f0f0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .ws-items-list[hidden] { display: none; }

  .ws-item-label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 0.92rem;
    font-weight: 600;
    color: #555;
    user-select: none;
  }

  .ws-item-label input[type=checkbox] {
    width: 17px; height: 17px;
    accent-color: var(--plum);
    cursor: pointer;
  }

  .ws-count-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: white;
    border-radius: 14px;
    padding: 12px 16px;
    margin: 14px 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
  }

  .ws-count-row input[type=number] {
    width: 68px;
    padding: 6px 8px;
    border: 2px solid #C5CAE9;
    border-radius: 10px;
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--ink);
    text-align: center;
  }

  .ws-status {
    text-align: center;
    font-family: 'Baloo 2', cursive;
    font-size: 0.95rem;
    font-weight: 700;
    margin-top: 10px;
    min-height: 22px;
    color: #E53935;
  }

  /* ── Level filtering ── */
  .chip[data-level="medium"],
  .chip[data-level="hard"]                              { display: none; }
  .word-group.show-medium  .chip[data-level="medium"],
  .team-group.show-medium  .chip[data-level="medium"]   { display: inline-flex; }

  .show-more-btn {
    display: inline-block;
    margin-top: 6px;
    font-family: 'Baloo 2', cursive;
    font-size: 0.78rem;
    background: #EDE7F6;
    border: 2px solid #B39DDB;
    border-radius: 50px;
    padding: 3px 14px;
    cursor: pointer;
    font-weight: 700;
    color: #4527A0;
    transition: background 0.15s;
  }
  .show-more-btn:hover { background: #D1C4E9; }

  .item-note {
    font-size: 0.8rem;
    color: #7B1FA2;
    background: #F3E5F5;
    border-radius: 8px;
    padding: 4px 8px;
    margin-bottom: 6px;
  }
  .item-rule {
    font-size: 0.8rem;
    color: #BF360C;
    background: #FFF3E0;
    border-radius: 8px;
    padding: 4px 8px;
    margin-bottom: 6px;
    font-weight: 700;
  }

  /* ── Quiz level picker ── */
  .level-pick-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin: 10px 0;
    background: #F5F5F5;
    border-radius: 12px;
    padding: 8px 12px;
  }
  .level-pick-row > span { font-family: 'Baloo 2', cursive; font-size: 0.9rem; font-weight: 700; color: var(--ink); }
  .lvl-btn {
    font-family: 'Baloo 2', cursive;
    font-size: 0.85rem;
    padding: 5px 14px;
    border-radius: 50px;
    border: 2px solid #ddd;
    background: white;
    cursor: pointer;
    font-weight: 700;
    color: #888;
    transition: all 0.15s;
  }
  .lvl-btn.on-easy   { background: #C8E6C9; border-color: #43A047; color: #1B5E20; }
  .lvl-btn.on-medium { background: #FFF9C4; border-color: #F9A825; color: #5D4037; }
  .lvl-btn.on-hard   { background: #FFCDD2; border-color: #E53935; color: #B71C1C; }

  /* ── Worksheet level row ── */
  .ws-level-row {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    background: white;
    border-radius: 14px;
    padding: 10px 16px;
    margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    font-family: 'Baloo 2', cursive;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--ink);
  }
  .ws-level-cb-label {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.88rem;
    user-select: none;
  }
  .ws-level-cb-label input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--plum); cursor: pointer; }

  /* ── Teacher notes ── */
  .tn-btn {
    font-family: 'Baloo 2', cursive;
    font-size: 0.72rem;
    background: #E8EAF6;
    border: 1.5px solid #9FA8DA;
    border-radius: 20px;
    padding: 2px 10px;
    cursor: pointer;
    font-weight: 700;
    color: #3949AB;
    margin-left: 8px;
    vertical-align: middle;
    transition: background 0.15s;
  }
  .tn-btn:hover, .tn-btn.open { background: #C5CAE9; }

  .tn-panel {
    margin-top: 8px;
    background: #F0F4FF;
    border: 1.5px dashed #9FA8DA;
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 0.82rem;
    color: #37474F;
    line-height: 1.55;
  }
  .tn-panel[hidden] { display: none; }
  .tn-field { margin-bottom: 4px; }
  .tn-field:last-child { margin-bottom: 0; }
  .tn-label { font-weight: 700; color: #3949AB; margin-right: 3px; }

  .team-group-head {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .team-group-head .team-label { margin-bottom: 0; }

  /* ── Worksheet notes checkbox ── */
  .ws-notes-row {
    display: flex;
    align-items: center;
    background: white;
    border-radius: 14px;
    padding: 10px 16px;
    margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .ws-notes-row label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-family: 'Baloo 2', cursive;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--ink);
    user-select: none;
  }
  .ws-notes-row input[type=checkbox] { width: 17px; height: 17px; accent-color: var(--plum); cursor: pointer; }

  /* ── Game 1: Letter Tile Builder ── */
  .g1-progress-strip {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 10px 4px 4px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .g1-progress-chip {
    font-size: 2rem;
    width: 54px;
    height: 54px;
    border-radius: 14px;
    background: white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    position: relative;
    transition: transform 0.2s, box-shadow 0.2s;
    border: 3px solid transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
  }

  .g1-progress-chip.active {
    transform: scale(1.18);
    box-shadow: 0 4px 14px rgba(0,0,0,0.2);
    border-color: var(--plum);
  }

  .g1-progress-chip.done {
    opacity: 0.6;
    border-color: #43A047;
  }

  .g1-progress-chip.done::after {
    content: '✓';
    position: absolute;
    top: -8px; right: -8px;
    background: #43A047;
    color: white;
    font-size: 0.65rem;
    font-weight: 900;
    width: 18px; height: 18px;
    border-radius: 50%;
    line-height: 18px;
    text-align: center;
  }

  .g1-active-area {
    background: white;
    border-radius: 20px;
    padding: 18px 14px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    margin-bottom: 12px;
  }

  .g1-emoji-large { font-size: 4rem; line-height: 1.2; margin-bottom: 14px; cursor: pointer; }

  .g1-blanks {
    display: flex;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .g1-blank {
    width: 44px; height: 52px;
    border: 3px dashed #C5CAE9;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Baloo 2', cursive;
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--ink);
    background: #F8F9FF;
    transition: border-color 0.15s, background 0.15s;
    cursor: pointer;
  }

  .g1-blank.drag-over { border-color: var(--plum); background: #EDE7F6; }

  .g1-blank.filled { border-style: solid; border-color: #43A047; background: #E8F5E9; }

  .g1-tray-label {
    font-family: 'Baloo 2', cursive;
    font-size: 0.85rem;
    font-weight: 700;
    color: #888;
    text-align: center;
    margin-bottom: 6px;
  }

  .g1-tray {
    background: white;
    border-radius: 18px;
    padding: 14px 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    min-height: 64px;
  }

  .g1-tile {
    width: 44px; height: 52px;
    background: var(--plum);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Baloo 2', cursive;
    font-size: 1.5rem;
    font-weight: 900;
    color: white;
    cursor: grab;
    box-shadow: 0 4px 0 #6A1B9A;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    user-select: none;
  }

  .g1-tile:active { transform: translateY(2px); box-shadow: 0 2px 0 #6A1B9A; }

  .g1-tile.selected {
    background: #F9A825;
    box-shadow: 0 4px 0 #F57F17;
    transform: translateY(-4px);
  }

  .g1-tile.wrong {
    background: #E53935;
    box-shadow: 0 2px 0 #B71C1C;
    animation: g1Shake 0.4s ease;
  }

  @keyframes g1Shake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-6px); }
    40%       { transform: translateX(6px); }
    60%       { transform: translateX(-4px); }
    80%       { transform: translateX(4px); }
  }

  .g1-confetti-piece {
    position: fixed;
    border-radius: 2px;
    animation: g1Fall linear forwards;
    pointer-events: none;
    z-index: 999;
  }

  @keyframes g1Fall {
    0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .g1-celebrate-card {
    text-align: center;
    padding: 30px 20px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  }

  /* ── Game 2: Match Word to Emoji ── */
  .g2-play-area {
    position: relative;
    display: flex;
    align-items: flex-start;
    background: white;
    border-radius: 18px;
    padding: 16px 12px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.08);
    margin-bottom: 12px;
    touch-action: none;
    min-height: 100px;
  }
  .g2-words-col { display: flex; flex-direction: column; gap: 10px; width: 38%; }
  .g2-emoji-col { display: flex; flex-direction: column; gap: 10px; width: 38%; margin-left: auto; }
  .g2-svg-overlay {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; overflow: visible;
  }
  .g2-word-item {
    background: #F3F4FF; border: 2px solid #C5CAE9; border-radius: 12px;
    padding: 10px 10px; font-family: 'Baloo 2', cursive; font-size: 1.05rem;
    font-weight: 700; color: var(--ink); cursor: pointer; text-align: center;
    user-select: none; touch-action: none;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .g2-emoji-item {
    background: white; border: 2px solid #E0E0E0; border-radius: 12px;
    padding: 8px 6px; font-size: 2rem; cursor: pointer; text-align: center;
    user-select: none; touch-action: none; line-height: 1.3;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .g2-word-item.selected  { background: #EDE7F6; border-color: var(--plum); transform: scale(1.04); }
  .g2-emoji-item.selected { background: #EDE7F6; border-color: var(--plum); transform: scale(1.04); }
  .g2-word-item.matched   { background: #E8F5E9; border-color: #43A047; color: #1B5E20; cursor: default; }
  .g2-emoji-item.matched  { background: #E8F5E9; border-color: #43A047; cursor: default; }
  .g2-word-item.g2-dragging, .g2-emoji-item.g2-dragging { opacity: 0.65; }

  /* ── Game 3: Missing Letter ── */
  .g3-prefilled {
    width: 44px; height: 52px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Baloo 2', cursive; font-size: 1.5rem; font-weight: 800;
    color: #9E9E9E;
    border-bottom: 3px solid #C5CAE9;
  }

  /* ── Games launcher ── */
  .games-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 8px;
  }

  .game-card {
    background: white;
    border-radius: 18px;
    padding: 22px 14px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    border: 3px solid transparent;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    user-select: none;
  }

  .game-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.13); border-color: var(--plum); }
  .game-card:active { transform: scale(0.97); }

  .game-card-icon { font-size: 3rem; margin-bottom: 8px; }
  .game-card-name { font-family: 'Baloo 2', cursive; font-size: 1.2rem; font-weight: 800; color: var(--ink); margin-bottom: 4px; }
  .game-card-desc { font-size: 0.82rem; color: #777; line-height: 1.4; }

  .back-btn {
    font-family: 'Baloo 2', cursive;
    font-size: 0.88rem;
    font-weight: 700;
    background: #EDE7F6;
    border: 2px solid #B39DDB;
    border-radius: 50px;
    padding: 6px 16px;
    cursor: pointer;
    color: #4527A0;
    margin-bottom: 14px;
    transition: background 0.15s;
    display: inline-block;
  }
  .back-btn:hover { background: #D1C4E9; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<header>
  <h1>🌟 Nyra Learns with Nana</h1>
  <p>Tap words to hear them · double-tap to flip! 🎉</p>
</header>

<div class="tabs" id="tabBar"></div>
<div id="content"></div>

<script>
const DEFAULT_EMOJI = '📖';
let DATA = null;
let currentQ = 0, score = 0, total = 0, answered = false, shuffledQuiz = [];

function getEmoji(wordObj, item, sec) {
  if (wordObj && wordObj.emoji) return wordObj.emoji;
  if (item && item.defaultEmoji) return item.defaultEmoji;
  if (sec && sec.defaultEmoji) return sec.defaultEmoji;
  return DEFAULT_EMOJI;
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.8; u.pitch = 1.2;
  window.speechSynthesis.speak(u);
}

function setupChipListeners(container) {
  container.querySelectorAll('.word-chips').forEach(group => {
    let clickTimer = null;

    group.addEventListener('click', e => {
      const chip = e.target.closest('.chip');
      if (!chip) return;
      clearTimeout(clickTimer);
      clickTimer = setTimeout(() => {
        if (chip.classList.contains('flipped')) {
          chip.classList.remove('flipped');
        }
        speak(chip.dataset.word);
      }, 200);
    });

    group.addEventListener('dblclick', e => {
      const chip = e.target.closest('.chip');
      if (!chip) return;
      e.preventDefault();
      clearTimeout(clickTimer);
      chip.classList.add('flipped');
    });
  });
}

function showTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const sec = document.getElementById('sec-' + id);
  if (sec) sec.classList.add('active');
  const btn = document.getElementById('btn-' + id);
  if (btn) btn.classList.add('active');
}

function renderChip(wordObj, item, sec) {
  const emoji = getEmoji(wordObj, item, sec);
  const w = wordObj.word.replace(/"/g, '&quot;');
  const e = emoji.replace(/"/g, '&quot;');
  const level = wordObj.level || 'easy';
  return `<span class="chip" data-word="${w}" data-emoji="${e}" data-level="${level}">` +
    `<span class="chip-word">${wordObj.word}</span>` +
    `<span class="chip-emoji">${emoji}</span>` +
    `</span>`;
}

function setupShowMore(container) {
  container.querySelectorAll('.word-group, .team-group').forEach(group => {
    const medChips = group.querySelectorAll('.chip[data-level="medium"]');
    if (medChips.length === 0) return;
    const btn = document.createElement('button');
    btn.className = 'show-more-btn';
    btn.textContent = `+ ${medChips.length} more`;
    btn.addEventListener('click', () => {
      const showing = group.classList.toggle('show-medium');
      btn.textContent = showing ? '▲ show less' : `+ ${medChips.length} more`;
    });
    group.querySelector('.word-chips').after(btn);
  });
}

function renderTeacherNotesHTML(item) {
  const tn = item.teacherNotes;
  if (!tn) return { btn: '', panel: '' };
  const fields = [
    ['🗣️', 'How to say it', tn.howToSay],
    ['📏', 'Rule', tn.simpleRule],
    ['🇮🇳', 'Indian English tip', tn.indianDadTip],
    ['⚠️', 'Watch out', tn.commonMistake],
    ['💬', 'Example', tn.exampleSentence],
  ].filter(([,,v]) => v);
  if (!fields.length) return { btn: '', panel: '' };
  const panelId = `tn-${item.id}`;
  const btn = `<button class="tn-btn" data-panel="${panelId}">📋 Notes</button>`;
  const panel = `<div class="tn-panel" id="${panelId}" hidden>` +
    fields.map(([icon, label, val]) =>
      `<div class="tn-field"><span class="tn-label">${icon} ${label}:</span> ${val}</div>`
    ).join('') +
    `</div>`;
  return { btn, panel };
}

function setupTeacherNotes(container) {
  container.querySelectorAll('.tn-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const panel = document.getElementById(btn.dataset.panel);
      if (!panel) return;
      const isHidden = panel.hasAttribute('hidden');
      if (isHidden) {
        panel.removeAttribute('hidden');
        btn.classList.add('open');
        btn.textContent = '📋 ▲';
      } else {
        panel.setAttribute('hidden', '');
        btn.classList.remove('open');
        btn.textContent = '📋 Notes';
      }
    });
  });
}

function renderVowelSection(sec) {
  const div = document.createElement('div');
  div.id = 'sec-' + sec.id;
  div.className = 'section';

  let html = `<div class="section-title">${sec.icon} ${sec.title}</div>`;

  if (sec.tip) html += `<div class="tip">📣 ${sec.tip}</div>`;

  if (sec.vowels) {
    html += `<div class="vowel-grid">`;
    for (const v of sec.vowels) {
      html += `<div class="vowel-card" onclick="speak('${v.speak}')">
        <div class="letter" style="color:${sec.color}">${v.letter}</div>
        <div class="word">${v.example}</div>
      </div>`;
    }
    html += `</div>`;
  }

  if (sec.rule) html += `<div class="rule-box"><span>✨</span> ${sec.rule}</div>`;

  if (sec.transforms) {
    html += `<div class="magic-e-demo">`;
    for (const t of sec.transforms) {
      const base = t.after.slice(0, -1);
      html += `<div class="word-transform">
        <span style="color:${DATA.sections[0].color}">${t.before}</span>
        <span class="arrow">→</span>
        <span style="color:${sec.color}">${base}<span class="magic-e" style="color:#F06292">e</span></span>
      </div>`;
    }
    html += `</div>`;
  }

  for (const item of sec.items) {
    const groupEmoji = item.defaultEmoji || sec.defaultEmoji || DEFAULT_EMOJI;
    const { btn: tnBtn, panel: tnPanel } = renderTeacherNotesHTML(item);
    html += `<div class="word-group" style="border-left-color:${sec.color}">
      <h3>${groupEmoji} ${item.label}${tnBtn}</h3>`;
    if (item.rule) html += `<div class="item-rule">📌 ${item.rule}</div>`;
    if (item.note) html += `<div class="item-note">💡 ${item.note}</div>`;
    html += `<div class="word-chips">`;
    for (const wordObj of item.words) {
      html += renderChip(wordObj, item, sec);
    }
    html += `</div>${tnPanel}</div>`;
  }

  div.innerHTML = html;
  setupChipListeners(div);
  setupShowMore(div);
  setupTeacherNotes(div);
  return div;
}

function renderTeamsSection(sec) {
  const div = document.createElement('div');
  div.id = 'sec-' + sec.id;
  div.className = 'section';

  let html = `<div class="section-title">${sec.icon} ${sec.title}</div>`;
  if (sec.tip) html += `<div class="tip">🤝 ${sec.tip}</div>`;

  for (const item of sec.items) {
    const { btn: tnBtn, panel: tnPanel } = renderTeacherNotesHTML(item);
    html += `<div class="team-group">
      <div class="team-group-head">
        <div class="team-label" style="background:${sec.color}">${item.label}</div>${tnBtn}
      </div>
      <div class="team-sound">👉 ${item.sound}</div>`;
    if (item.note) html += `<div class="item-note">💡 ${item.note}</div>`;
    html += `<div class="word-chips">`;
    for (const wordObj of item.words) {
      html += renderChip(wordObj, item, sec);
    }
    html += `</div>${tnPanel}</div>`;
  }

  div.innerHTML = html;
  setupChipListeners(div);
  setupShowMore(div);
  setupTeacherNotes(div);
  return div;
}

function buildQuizData(sections) {
  const titles = sections.map(s => s.title);
  const qs = [];
  for (const sec of sections) {
    for (const item of sec.items) {
      for (const wObj of item.words) {
        const wrong = shuffle(titles.filter(t => t !== sec.title)).slice(0, 3);
        qs.push({
          topic: sec.id,
          level: wObj.level || 'easy',
          word: wObj.word,
          answer: sec.title,
          options: shuffle([sec.title, ...wrong])
        });
      }
    }
  }
  return qs;
}

function renderQuizSection(quizData, sections) {
  const div = document.createElement('div');
  div.id = 'sec-quiz';
  div.className = 'section';

  let html = `<button class="back-btn" id="quizBackBtn">← Games</button>
  <div class="section-title">⭐ Quiz Time!</div>
  <div id="quizSetup">
    <div class="tip">👆 Pick what you want to practice today!</div>
    <div style="display:grid;gap:10px;margin-bottom:4px;">`;

  for (const sec of sections) {
    const eg = sec.items.slice(0, 3).flatMap(i => i.words.slice(0, 2).map(w => w.word)).join(', ');
    html += `<label class="topic-card" style="border-color:${sec.color}">
      <input type="checkbox" class="quiz-topic-cb" value="${sec.id}" checked>
      <span class="topic-icon">${sec.icon}</span>
      <span class="topic-name">${sec.title}</span>
      <span class="topic-eg">${eg}</span>
    </label>`;
  }

  html += `</div>
    <div class="level-pick-row">
      <span>Level:</span>
      <button class="lvl-btn on-easy"  data-level="easy">⭐ Easy</button>
      <button class="lvl-btn"          data-level="medium">⭐⭐ Medium</button>
      <button class="lvl-btn"          data-level="hard">⭐⭐⭐ Hard</button>
    </div>
    <button class="next-btn" id="startQuizBtn">▶️ Start Quiz!</button>
    <div id="topicWarning" style="color:#E53935;font-weight:700;text-align:center;margin-top:8px;display:none;">Please pick at least one topic and level! 🙏</div>
  </div>

  <div id="quizPlay" style="display:none;">
    <div class="score-bar">
      <span>⭐ Score</span>
      <span class="score-num" id="scoreDisplay">0</span>
      <span>/ <span id="totalDisplay">0</span></span>
      <button id="changeTopicsBtn" style="font-family:'Baloo 2',cursive;background:#90CAF9;border:none;padding:6px 12px;border-radius:20px;cursor:pointer;font-weight:700;">⬅️ Change</button>
    </div>
    <div class="quiz-card">
      <div class="quiz-question">Which group does this word belong to?</div>
      <div class="quiz-word" id="quizWord"></div>
      <div class="quiz-options" id="quizOptions"></div>
      <div class="quiz-result" id="quizResult"></div>
    </div>
    <button class="next-btn" id="nextQuizBtn">Next Word ➡️</button>
  </div>`;

  div.innerHTML = html;

  div.querySelector('#quizBackBtn').addEventListener('click', () => showGames());

  div.querySelectorAll('.lvl-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const classMap = { easy: 'on-easy', medium: 'on-medium', hard: 'on-hard' };
      btn.classList.toggle(classMap[btn.dataset.level]);
    });
  });

  div.querySelector('#startQuizBtn').addEventListener('click', () => startQuiz(quizData));
  div.querySelector('#changeTopicsBtn').addEventListener('click', backToSetup);
  div.querySelector('#nextQuizBtn').addEventListener('click', nextQuestion);

  return div;
}

function shuffle(arr) { return arr.slice().sort(() => Math.random() - 0.5); }

function getSelectedTopics() {
  return Array.from(document.querySelectorAll('.quiz-topic-cb:checked')).map(cb => cb.value);
}

function getSelectedLevels() {
  const map = { 'on-easy': 'easy', 'on-medium': 'medium', 'on-hard': 'hard' };
  const levels = [];
  document.querySelectorAll('.lvl-btn').forEach(btn => {
    for (const [cls, lvl] of Object.entries(map)) {
      if (btn.classList.contains(cls)) levels.push(lvl);
    }
  });
  return levels;
}

function startQuiz(quizData) {
  const topics = getSelectedTopics();
  const levels = getSelectedLevels();
  if (topics.length === 0 || levels.length === 0) {
    document.getElementById('topicWarning').style.display = 'block';
    return;
  }
  document.getElementById('topicWarning').style.display = 'none';
  shuffledQuiz = shuffle(quizData.filter(q => topics.includes(q.topic) && levels.includes(q.level)));
  if (shuffledQuiz.length === 0) {
    document.getElementById('topicWarning').style.display = 'block';
    document.getElementById('topicWarning').textContent = 'No words found for this combo — try adding more levels!';
    return;
  }
  currentQ = 0; score = 0; total = 0; answered = false;
  updateScore();
  document.getElementById('quizSetup').style.display = 'none';
  document.getElementById('quizPlay').style.display = 'block';
  renderQuestion();
}

function backToSetup() {
  document.getElementById('quizSetup').style.display = 'block';
  document.getElementById('quizPlay').style.display = 'none';
}

function renderQuestion() {
  if (currentQ >= shuffledQuiz.length) currentQ = 0;
  const q = shuffledQuiz[currentQ];
  document.getElementById('quizWord').textContent = q.word;
  document.getElementById('quizResult').textContent = '';
  speak(q.word);
  answered = false;

  const container = document.getElementById('quizOptions');
  container.innerHTML = '';
  shuffle(q.options).forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => checkAnswer(btn, opt, q.answer, container));
    container.appendChild(btn);
  });
}

function checkAnswer(btn, chosen, correct, container) {
  if (answered) return;
  answered = true;
  total++;
  container.querySelectorAll('.quiz-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
  });
  const result = document.getElementById('quizResult');
  if (chosen === correct) {
    score++;
    btn.classList.add('correct');
    result.textContent = '🎉 Wah, correct! Shabash! 🌟';
    speak('Correct! Great job!');
  } else {
    btn.classList.add('wrong');
    result.textContent = 'Oops! It is ' + correct + '. Try again!';
    speak('The answer is ' + correct);
  }
  updateScore();
}

function nextQuestion() { currentQ++; renderQuestion(); }

function updateScore() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('totalDisplay').textContent = total;
}

// ── Shared selector component ───────────────────────────────────────────────

function buildSelectorHTML(sections, prefix, opts = {}) {
  const {
    defaultCount = 25,
    minCount = 1,
    maxCount = 200,
    countLabel = 'Words per category:',
  } = opts;
  let html = `<div id="${prefix}-categories">`;
  for (const sec of sections) {
    html += `<div class="ws-section-box">
      <div class="ws-section-header">
        <label class="ws-sec-check-wrap">
          <input type="checkbox" class="${prefix}-sec-cb" data-sec="${sec.id}" checked>
          <span class="ws-color-dot" style="background:${sec.color}"></span>
          <span class="ws-section-name">${sec.title}</span>
        </label>
        <button class="ws-expand-btn" data-sec="${sec.id}" type="button">&#9654;</button>
      </div>
      <div class="ws-items-list" id="${prefix}-items-${sec.id}" hidden>`;
    for (const item of sec.items) {
      html += `<label class="ws-item-label">
          <input type="checkbox" class="${prefix}-item-cb" data-sec="${sec.id}" data-item="${item.id}" checked>
          ${item.label}
        </label>`;
    }
    html += `</div></div>`;
  }
  html += `</div>
  <div class="ws-level-row">
    <span>Levels:</span>
    <label class="ws-level-cb-label"><input type="checkbox" class="${prefix}-level-cb" value="easy" checked> ⭐ Easy</label>
    <label class="ws-level-cb-label"><input type="checkbox" class="${prefix}-level-cb" value="medium" checked> ⭐⭐ Medium</label>
    <label class="ws-level-cb-label"><input type="checkbox" class="${prefix}-level-cb" value="hard"> ⭐⭐⭐ Hard</label>
  </div>
  <div class="ws-count-row">
    <span>${countLabel}</span>
    <input type="number" id="${prefix}-word-count" value="${defaultCount}" min="${minCount}" max="${maxCount}">
  </div>`;
  return html;
}

function setupSelector(containerEl, prefix) {
  containerEl.querySelectorAll('.ws-expand-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const itemsList = document.getElementById(`${prefix}-items-${btn.dataset.sec}`);
      if (!itemsList) return;
      const opening = itemsList.hidden;
      itemsList.hidden = !opening;
      btn.classList.toggle('open', opening);
    });
  });
  containerEl.querySelectorAll(`.${prefix}-sec-cb`).forEach(cb => {
    cb.addEventListener('change', () => {
      containerEl.querySelectorAll(`.${prefix}-item-cb[data-sec="${cb.dataset.sec}"]`).forEach(icb => {
        icb.checked = cb.checked;
      });
    });
  });
}

function getSelectorWords(sections, containerEl, prefix) {
  const selectedLevels = Array.from(
    containerEl.querySelectorAll(`.${prefix}-level-cb:checked`)
  ).map(cb => cb.value);
  const wordCount = Math.max(1, parseInt(containerEl.querySelector(`#${prefix}-word-count`).value, 10) || 5);
  let words = [];
  for (const sec of sections) {
    const checkedItems = Array.from(
      containerEl.querySelectorAll(`.${prefix}-item-cb[data-sec="${sec.id}"]:checked`)
    ).map(cb => cb.dataset.item);
    for (const item of sec.items) {
      if (!checkedItems.includes(item.id)) continue;
      for (const wObj of item.words) {
        if (!selectedLevels.length || selectedLevels.includes(wObj.level || 'easy')) {
          words.push({ word: wObj.word, emoji: getEmoji(wObj, item, sec), level: wObj.level || 'easy' });
        }
      }
    }
  }
  return shuffle(words).slice(0, wordCount);
}

// ── Worksheet ──────────────────────────────────────────────────────────────

function renderWorksheetSection(sections) {
  const div = document.createElement('div');
  div.id = 'sec-worksheet';
  div.className = 'section';

  div.innerHTML = `<div class="section-title">Worksheet Generator</div>
  <div class="tip">📝 Pick categories, set word count, then download your PDF!</div>
  ${buildSelectorHTML(sections, 'ws', { defaultCount: 25, minCount: 1, maxCount: 200, countLabel: 'Words per category:' })}
  <div class="ws-notes-row">
    <label>
      <input type="checkbox" id="wsIncludeNotes">
      📋 Include teaching notes in PDF
    </label>
  </div>
  <button class="next-btn" id="wsGenerateBtn" type="button">&#128196; Download PDF</button>
  <div class="ws-status" id="wsStatus"></div>`;

  setupSelector(div, 'ws');

  div.querySelector('#wsGenerateBtn').addEventListener('click', async () => {
    const btn = div.querySelector('#wsGenerateBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Preparing…';
    try {
      await generateWorksheetPDF(sections);
    } catch (err) {
      document.getElementById('wsStatus').textContent = 'Error generating PDF. Please try again.';
      console.error(err);
    } finally {
      btn.disabled = false;
      btn.textContent = '📄 Download PDF';
    }
  });

  return div;
}

// ── PDF emoji helpers ───────────────────────────────────────────────────────

const _emojiCache = new Map();

function emojiToTwemojiUrl(emoji) {
  const cps = [];
  for (let i = 0; i < emoji.length; ) {
    const cp = emoji.codePointAt(i);
    if (cp !== 0xFE0F) cps.push(cp.toString(16));
    i += cp > 0xFFFF ? 2 : 1;
  }
  return `https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/${cps.join('-')}.png`;
}

async function loadEmojiImage(emoji) {
  if (_emojiCache.has(emoji)) return _emojiCache.get(emoji);
  try {
    const res = await fetch(emojiToTwemojiUrl(emoji));
    if (!res.ok) { _emojiCache.set(emoji, null); return null; }
    const blob = await res.blob();
    const dataUrl = await new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onload = () => resolve(fr.result);
      fr.onerror = reject;
      fr.readAsDataURL(blob);
    });
    _emojiCache.set(emoji, dataUrl);
    return dataUrl;
  } catch {
    _emojiCache.set(emoji, null);
    return null;
  }
}

// ── PDF generation ──────────────────────────────────────────────────────────

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

async function generateWorksheetPDF(sections) {
  const statusEl = document.getElementById('wsStatus');
  if (!window.jspdf) {
    statusEl.textContent = 'PDF library not loaded — please try again in a moment.';
    return;
  }
  statusEl.textContent = '';

  const wordCount = Math.max(1, parseInt(document.getElementById('ws-word-count').value, 10) || 25);
  const selectedLevels = Array.from(document.querySelectorAll('.ws-level-cb:checked')).map(cb => cb.value);
  const includeNotes = document.getElementById('wsIncludeNotes').checked;

  // Build render blocks: per-item (with tn) when notes on, per-section when off
  const renderBlocks = [];

  for (const sec of sections) {
    const checkedItems = Array.from(
      document.querySelectorAll(`.ws-item-cb[data-sec="${sec.id}"]:checked`)
    ).map(cb => cb.dataset.item);
    if (checkedItems.length === 0) continue;

    if (includeNotes) {
      for (const item of sec.items) {
        if (!checkedItems.includes(item.id)) continue;
        let words = item.words
          .filter(w => !selectedLevels.length || selectedLevels.includes(w.level || 'easy'))
          .map(w => ({ word: w.word, emoji: getEmoji(w, item, sec) }));
        if (!words.length) continue;
        words = shuffle(words).slice(0, wordCount);
        renderBlocks.push({ label: item.label, rgb: hexToRgb(sec.color), words, tn: item.teacherNotes || null });
      }
    } else {
      let words = [];
      for (const item of sec.items) {
        if (checkedItems.includes(item.id)) {
          for (const wObj of item.words) {
            if (!selectedLevels.length || selectedLevels.includes(wObj.level || 'easy')) {
              words.push({ word: wObj.word, emoji: getEmoji(wObj, item, sec) });
            }
          }
        }
      }
      if (!words.length) continue;
      words = shuffle(words).slice(0, wordCount);
      renderBlocks.push({ label: sec.title, rgb: hexToRgb(sec.color), words, tn: null });
    }
  }

  if (renderBlocks.length === 0) {
    statusEl.textContent = 'Please select at least one category!';
    return;
  }

  // Pre-fetch emoji images
  statusEl.textContent = 'Loading emoji…';
  const allEmoji = [...new Set(renderBlocks.flatMap(b => b.words.map(w => w.emoji)))];
  await Promise.all(allEmoji.map(e => loadEmojiImage(e)));
  statusEl.textContent = '';

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'letter', orientation: 'portrait' });

  const pageW = 215.9, pageH = 279.4;
  const mL = 15, mT = 20, mB = 15;
  const workW = pageW - mL * 2;
  const cols = 4;
  const gapX = 3;
  const cellW = (workW - gapX * (cols - 1)) / cols;
  const cellH = 26;
  const gapY = 3;
  const hdrH = 9;
  const emojiSz = 9;

  // Title block
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(16);
  doc.text("Nyra's Spelling Worksheet", pageW / 2, mT, { align: 'center' });
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  const today = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  doc.text(today, pageW / 2, mT + 6, { align: 'center' });
  doc.setFontSize(9);
  doc.setTextColor(130, 130, 130);
  doc.text('Name: _________________________', mL, mT + 13);
  doc.setTextColor(0, 0, 0);

  let y = mT + 20;

  for (const { label, rgb, words, tn } of renderBlocks) {
    const [rr, gg, bb] = rgb;

    // Compute notes box height upfront so we can keep header+notes+first-row together
    let notesBoxH = 0;
    let rendNoteLines = null;
    if (tn) {
      const noteFields = [
        ['Rule', tn.simpleRule],
        ['Indian tip', tn.indianDadTip],
        ['Watch out', tn.commonMistake],
      ].filter(([, v]) => v);
      if (noteFields.length > 0) {
        const nFontSz = 7.5, nLH = 4, nPadV = 2.5, nPadH = 3;
        doc.setFontSize(nFontSz);
        rendNoteLines = noteFields.map(([lbl, txt]) => ({
          label: lbl + ':',
          body: doc.splitTextToSize(txt, workW - nPadH * 2 - 10),
        }));
        const totalL = rendNoteLines.reduce((s, r) => s + 1 + r.body.length, 0);
        notesBoxH = nPadV * 2 + totalL * nLH + 3;
      }
    }

    if (y + hdrH + notesBoxH + cellH + gapY > pageH - mB) {
      doc.addPage();
      y = mT;
    }

    // Section/item header
    doc.setFillColor(rr, gg, bb);
    doc.roundedRect(mL, y, workW, hdrH, 2, 2, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    doc.text(label, mL + 4, y + hdrH * 0.68);
    doc.setTextColor(0, 0, 0);
    y += hdrH + 2;

    // Teacher notes box
    if (rendNoteLines) {
      const nFontSz = 7.5, nLH = 4, nPadV = 2.5, nPadH = 3;
      const totalL = rendNoteLines.reduce((s, r) => s + 1 + r.body.length, 0);
      const boxH = nPadV * 2 + totalL * nLH;

      doc.setFillColor(242, 245, 255);
      doc.setDrawColor(140, 160, 200);
      doc.setLineWidth(0.25);
      doc.rect(mL, y, workW, boxH, 'FD');

      let cy = y + nPadV + nLH * 0.82;
      doc.setFontSize(nFontSz);
      for (const { label: lbl, body } of rendNoteLines) {
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(60, 80, 160);
        doc.text(lbl, mL + nPadH, cy);
        cy += nLH;
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(40, 40, 50);
        for (const line of body) {
          doc.text(line, mL + nPadH + 8, cy);
          cy += nLH;
        }
      }
      y += boxH + 3;
    }

    // Word grid
    const rowCount = Math.ceil(words.length / cols);
    for (let row = 0; row < rowCount; row++) {
      if (y + cellH > pageH - mB) {
        doc.addPage();
        y = mT;
      }
      for (let col = 0; col < cols; col++) {
        const idx = row * cols + col;
        if (idx >= words.length) break;
        const { word, emoji } = words[idx];
        const x = mL + col * (cellW + gapX);

        const imgData = _emojiCache.get(emoji);
        if (imgData) {
          const ex = x + (cellW - emojiSz) / 2;
          doc.addImage(imgData, 'PNG', ex, y + 1, emojiSz, emojiSz);
        }

        doc.setFont('helvetica', 'bold');
        doc.setFontSize(11);
        doc.setTextColor(20, 20, 20);
        doc.text(word, x + 2, y + 15);

        doc.setDrawColor(185, 185, 185);
        doc.setLineWidth(0.3);
        doc.line(x + 2, y + 22, x + cellW - 2, y + 22);
      }
      y += cellH + gapY;
    }
    y += 5;
  }

  const dateStr = new Date().toISOString().slice(0, 10);
  doc.save(`Nyra-Worksheet-${dateStr}.pdf`);
}

let g2EmojiOrder = [];
let g2Selected = null;
let g2MatchedCount = 0;
let g2MatchedEmoji = new Set();

function startGame2(containerEl, words) {
  g2LastWords = words;
  g2Words = words.map(({ word, emoji }) => ({ word, emoji, matched: false }));
  g2EmojiOrder = shuffle([...Array(words.length).keys()]);
  g2Selected = null;
  g2MatchedCount = 0;
  g2MatchedEmoji = new Set();

  containerEl.querySelector('#g2-setup').style.display = 'none';
  const playEl = containerEl.querySelector('#g2-play');
  playEl.style.display = 'block';
  playEl.innerHTML = `
    <div class="tip" style="font-size:0.82rem;margin-bottom:8px;">💡 Tap a word, then tap its picture — or drag to connect!</div>
    <div class="g2-play-area" id="g2-play-area">
      <svg class="g2-svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="g2-words-col" id="g2-words-col"></div>
      <div class="g2-emoji-col" id="g2-emoji-col"></div>
    </div>
  `;

  const playArea = playEl.querySelector('#g2-play-area');
  g2Words.forEach((w, i) => {
    const el = document.createElement('div');
    el.className = 'g2-word-item';
    el.dataset.wordIdx = String(i);
    el.textContent = w.word;
    playArea.querySelector('#g2-words-col').appendChild(el);
  });
  g2EmojiOrder.forEach((wordIdx, pos) => {
    const el = document.createElement('div');
    el.className = 'g2-emoji-item';
    el.dataset.emojiPos = String(pos);
    el.textContent = g2Words[wordIdx].emoji;
    playArea.querySelector('#g2-emoji-col').appendChild(el);
  });

  g2SetupPointerEvents(playArea);
}

function g2SetupPointerEvents(playArea) {
  let ds = null; // drag state

  playArea.addEventListener('pointerdown', e => {
    const item = e.target.closest('.g2-word-item, .g2-emoji-item');
    if (!item) return;
    if (item.classList.contains('matched')) {
      if (item.classList.contains('g2-emoji-item'))
        speak(g2Words[g2EmojiOrder[parseInt(item.dataset.emojiPos, 10)]].word);
      return;
    }
    playArea.setPointerCapture(e.pointerId);
    const type = item.classList.contains('g2-word-item') ? 'word' : 'emoji';
    const idx = type === 'word' ? parseInt(item.dataset.wordIdx, 10) : parseInt(item.dataset.emojiPos, 10);
    ds = { type, idx, item, startX: e.clientX, startY: e.clientY, isDragging: false };
  });

  playArea.addEventListener('pointermove', e => {
    if (!ds) return;
    if (!ds.isDragging) {
      if (Math.hypot(e.clientX - ds.startX, e.clientY - ds.startY) < 8) return;
      ds.isDragging = true;
      ds.item.classList.add('g2-dragging');
    }
    const cr = playArea.getBoundingClientRect();
    const er = ds.item.getBoundingClientRect();
    const x1 = ds.type === 'word' ? er.right - cr.left : er.left - cr.left;
    const y1 = er.top + er.height / 2 - cr.top;
    const svg = playArea.querySelector('.g2-svg-overlay');
    let ln = svg.querySelector('#g2-drag-line');
    if (!ln) {
      ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      ln.id = 'g2-drag-line';
      ln.setAttribute('stroke', '#9C27B0');
      ln.setAttribute('stroke-width', '3');
      ln.setAttribute('stroke-dasharray', '8,4');
      ln.setAttribute('stroke-linecap', 'round');
      svg.appendChild(ln);
    }
    ln.setAttribute('x1', x1); ln.setAttribute('y1', y1);
    ln.setAttribute('x2', e.clientX - cr.left); ln.setAttribute('y2', e.clientY - cr.top);
  });

  playArea.addEventListener('pointerup', e => {
    if (!ds) return;
    try { playArea.releasePointerCapture(e.pointerId); } catch (_) {}
    playArea.querySelector('#g2-drag-line')?.remove();
    ds.item.classList.remove('g2-dragging');

    if (ds.isDragging) {
      const hit = document.elementFromPoint(e.clientX, e.clientY)?.closest('.g2-word-item, .g2-emoji-item');
      if (hit && !hit.classList.contains('matched')) {
        const tType = hit.classList.contains('g2-word-item') ? 'word' : 'emoji';
        if (tType !== ds.type) {
          const wi = ds.type === 'word' ? ds.idx : parseInt(hit.dataset.wordIdx, 10);
          const ep = ds.type === 'emoji' ? ds.idx : parseInt(hit.dataset.emojiPos, 10);
          g2TryMatch(wi, ep, playArea);
        }
      }
    } else {
      g2HandleTap(ds.type, ds.idx, ds.item, playArea);
    }
    ds = null;
  });

  playArea.addEventListener('pointercancel', () => {
    if (!ds) return;
    playArea.querySelector('#g2-drag-line')?.remove();
    ds.item.classList.remove('g2-dragging');
    ds = null;
  });
}

function g2HandleTap(type, idx, el, playArea) {
  if (type === 'emoji') speak(g2Words[g2EmojiOrder[idx]].word);
  if (!g2Selected) {
    g2Selected = { type, idx, el };
    el.classList.add('selected');
    return;
  }
  if (g2Selected.type === type) {
    g2Selected.el.classList.remove('selected');
    g2Selected = g2Selected.idx === idx ? null : { type, idx, el };
    if (g2Selected) el.classList.add('selected');
    return;
  }
  g2Selected.el.classList.remove('selected');
  const wi = g2Selected.type === 'word' ? g2Selected.idx : idx;
  const ep = g2Selected.type === 'emoji' ? g2Selected.idx : idx;
  g2Selected = null;
  g2TryMatch(wi, ep, playArea);
}

function g2TryMatch(wordIdx, emojiPos, playArea) {
  if (g2Words[wordIdx].matched || g2MatchedEmoji.has(emojiPos)) return;
  const wordEl = playArea.querySelector(`.g2-word-item[data-word-idx="${wordIdx}"]`);
  const emojiEl = playArea.querySelector(`.g2-emoji-item[data-emoji-pos="${emojiPos}"]`);
  if (!wordEl || !emojiEl) return;

  const cr = playArea.getBoundingClientRect();
  const wr = wordEl.getBoundingClientRect();
  const er = emojiEl.getBoundingClientRect();
  const x1 = wr.right - cr.left,   y1 = wr.top + wr.height / 2 - cr.top;
  const x2 = er.left - cr.left,    y2 = er.top + er.height / 2 - cr.top;

  const svg = playArea.querySelector('.g2-svg-overlay');
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', x1); line.setAttribute('y1', y1);
  line.setAttribute('x2', x2); line.setAttribute('y2', y2);
  line.setAttribute('stroke-width', '4'); line.setAttribute('stroke-linecap', 'round');

  if (wordIdx === g2EmojiOrder[emojiPos]) {
    g2Words[wordIdx].matched = true;
    g2MatchedEmoji.add(emojiPos);
    line.setAttribute('stroke', '#43A047');
    svg.appendChild(line);
    wordEl.classList.add('matched');
    emojiEl.classList.add('matched');
    playChime(659, 0.35);
    g2MatchedCount++;
    if (g2MatchedCount === g2Words.length) setTimeout(g2Celebrate, 700);
  } else {
    line.setAttribute('stroke', '#E53935');
    svg.appendChild(line);
    setTimeout(() => {
      line.style.transition = 'opacity 0.2s';
      line.style.opacity = '0';
      setTimeout(() => line.remove(), 220);
    }, 400);
  }
}

function g2Celebrate() {
  const playEl = document.getElementById('g2-play');
  if (!playEl) return;
  playChime(784, 0.15);
  setTimeout(() => playChime(988, 0.15), 160);
  setTimeout(() => playChime(1175, 0.3), 300);
  const colors = ['#FFD54F','#9C27B0','#1565C0','#43A047','#E53935','#FF7043'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'g1-confetti-piece';
    p.style.cssText = `left:${Math.random()*100}vw;top:0;background:${colors[i%colors.length]};` +
      `width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;` +
      `animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 3500);
  }
  playEl.innerHTML = `
    <div class="g1-celebrate-card">
      <div style="font-size:4rem;margin-bottom:8px;">🎉</div>
      <div style="font-family:'Baloo 2',cursive;font-size:2rem;color:var(--plum);margin-bottom:6px;">Excellent!</div>
      <div style="font-family:'Baloo 2',cursive;font-size:1.1rem;color:#555;margin-bottom:20px;">You matched all the words! Shabash! ⭐</div>
      <button class="next-btn" id="g2PlayAgain">🔄 Play Again!</button>
    </div>`;
  document.getElementById('g2PlayAgain').addEventListener('click', () => {
    const secEl = document.getElementById('sec-game2');
    startGame2(secEl, getSelectorWords(DATA.sections, secEl, 'g2'));

}

async function generateMatchPDF(words) {
  if (!window.jspdf) throw new Error('PDF library not loaded');
  await Promise.all([...new Set(words.map(w => w.emoji))].map(e => loadEmojiImage(e)));

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'letter', orientation: 'portrait' });
  const pageW = 215.9;
  const mL = 20, mT = 20;
  const colW = 68;
  const midGap = pageW - mL * 2 - colW * 2; // ~40mm for pencil lines
  const rightColX = mL + colW + midGap;
  const rowH = 20, emojiSz = 11, dotR = 1.8;

  doc.setFont('helvetica', 'bold'); doc.setFontSize(13);
  doc.text('Draw a line to match each word to its picture!', pageW / 2, mT, { align: 'center' });
  doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
  doc.setTextColor(130, 130, 130);
  doc.text('Name: _________________________', mL, mT + 9);
  doc.setTextColor(0, 0, 0);

  const emojiOrder = shuffle([...Array(words.length).keys()]);
  let y = mT + 18;

  for (let i = 0; i < words.length; i++) {
    doc.setFont('helvetica', 'bold'); doc.setFontSize(13); doc.setTextColor(20, 20, 20);
    doc.text(words[i].word, mL + 3, y + rowH / 2 + 2);
    const leftDotX = mL + 3 + doc.getTextWidth(words[i].word) + 4;

    doc.setFillColor(100, 100, 220);
    doc.circle(leftDotX, y + rowH / 2, dotR, 'F');
    doc.circle(rightColX + 2, y + rowH / 2, dotR, 'F');

    const imgData = _emojiCache.get(words[emojiOrder[i]].emoji);
    if (imgData) doc.addImage(imgData, 'PNG', rightColX + 6, y + (rowH - emojiSz) / 2, emojiSz, emojiSz);

    y += rowH + 5;
  }

  doc.save(`Nyra-Match-${new Date().toISOString().slice(0, 10)}.pdf`);
}

function sharedRenderStrip(words, activeIdx, stripId) {
  const el = document.getElementById(stripId);
  if (!el) return;
  el.innerHTML = words.map((w, i) => {
    const cls = w.done ? 'done' : (i === activeIdx ? 'active' : '');
    return `<div class="g1-progress-chip ${cls}" data-word="${w.word}">${w.emoji}</div>`;
  }).join('');
  el.querySelectorAll('.g1-progress-chip').forEach(chip =>
    chip.addEventListener('click', () => speak(chip.dataset.word))
  );
}

function sharedRenderTray(tiles, getSelectedId, trayId, setSelectedId) {
  const tray = document.getElementById(trayId);
  if (!tray) return;
  tray.innerHTML = '';
  tiles.filter(t => !t.placed).forEach(tile => {
    const el = document.createElement('div');
    el.className = 'g1-tile' + (getSelectedId() === tile.id ? ' selected' : '');
    el.textContent = tile.letter;
    el.draggable = true;
    el.dataset.tileId = String(tile.id);
    el.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', String(tile.id));
      setSelectedId(null);
      tray.querySelectorAll('.g1-tile').forEach(t => t.classList.remove('selected'));
    });
    el.addEventListener('click', () => {
      const cur = getSelectedId();
      const next = cur === tile.id ? null : tile.id;
      setSelectedId(next);
      tray.querySelectorAll('.g1-tile').forEach(t => t.classList.remove('selected'));
      if (next !== null) el.classList.add('selected');
    });
    tray.appendChild(el);
  });
}

function sharedWireBlanks(blanksEl, getSelectedId, onPlace) {
  blanksEl.querySelectorAll('.g1-blank:not(.filled)').forEach(blank => {
    blank.addEventListener('dragover', e => { e.preventDefault(); blank.classList.add('drag-over'); });
    blank.addEventListener('dragleave', () => blank.classList.remove('drag-over'));
    blank.addEventListener('drop', e => {
      e.preventDefault();
      blank.classList.remove('drag-over');
      onPlace(parseInt(e.dataTransfer.getData('text/plain'), 10), parseInt(blank.dataset.pos, 10));
    });
    blank.addEventListener('click', () => {
      const sel = getSelectedId();
      if (sel !== null) onPlace(sel, parseInt(blank.dataset.pos, 10));
    });
  });
}

function sharedTryPlace(tileId, pos, tiles, blanks, trayId, onCorrect) {
  const tile = tiles.find(t => t.id === tileId);
  if (!tile || tile.placed) return;
  const blank = blanks[pos];
  if (!blank || blank.filled || blank.prefilled) return;
  if (tile.letter === blank.letter) {
    onCorrect(tile, blank);
  } else {
    const tray = document.getElementById(trayId);
    if (tray) {
      tray.querySelectorAll('.g1-tile').forEach(t => t.classList.remove('selected'));
      const tileEl = tray.querySelector(`[data-tile-id="${tileId}"]`);
      if (tileEl) {
        tileEl.classList.add('wrong');
        setTimeout(() => tileEl.classList.remove('wrong'), 450);
      }
    }
  }
}

function pickBlankPositions(word, level) {
  const counts = { easy: 1, medium: 2, hard: 3 };
  const count = Math.min(counts[level] || 1, word.length - 1);
  return new Set(shuffle([...Array(word.length).keys()]).slice(0, count));
}

// ── Game 1: Letter Tile Builder ─────────────────────────────────────────────

let g1Words = [];
let g1Tiles = [];
let g1ActiveIdx = 0;
let g1SelectedTile = null;
let g1TileCounter = 0;
let g1LastWords = [];

function playChime(freq, dur) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(0.35, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur);
  } catch (e) {}
}

function renderGame1Section(sections) {
  const div = document.createElement('div');
  div.id = 'sec-game1';
  div.className = 'section';
  div.innerHTML = `
    <button class="back-btn" id="g1BackBtn">← Games</button>
    <div class="section-title">🔤 Letter Builder</div>
    <div id="g1-setup">
      <div class="tip">🎮 Pick words, then spell them using letter tiles!</div>
      ${buildSelectorHTML(sections, 'g1', { defaultCount: 5, minCount: 2, maxCount: 10, countLabel: 'Words per round:' })}
      <button class="next-btn" id="g1StartBtn" style="margin-top:14px;">▶️ Start Game!</button>
      <div id="g1SetupErr" class="ws-status"></div>
    </div>
    <div id="g1-play" style="display:none;"></div>
  `;
  setupSelector(div, 'g1');
  div.querySelector('#g1BackBtn').addEventListener('click', () => showGames());
  div.querySelector('#g1StartBtn').addEventListener('click', () => {
    const words = getSelectorWords(sections, div, 'g1');
    const err = div.querySelector('#g1SetupErr');
    if (!words.length) {
      err.textContent = 'No words found — try selecting more categories or levels!';
      return;
    }
    err.textContent = '';
    startGame1(div, words);
  });
  return div;
}

function startGame1(containerEl, words) {
  g1LastWords = words;
  g1TileCounter = 0;
  g1SelectedTile = null;
  g1ActiveIdx = 0;
  g1Words = words.map(({ word, emoji }) => ({
    word,
    emoji,
    blanks: word.toUpperCase().split('').map(ch => ({ letter: ch, filled: false })),
    done: false,
  }));
  g1Tiles = shuffle(
    g1Words.flatMap(w =>
      w.word.toUpperCase().split('').map(ch => ({ id: g1TileCounter++, letter: ch, placed: false }))
    )
  );
  containerEl.querySelector('#g1-setup').style.display = 'none';
  const playEl = containerEl.querySelector('#g1-play');
  playEl.style.display = 'block';
  playEl.innerHTML = `
    <div class="g1-progress-strip" id="g1-strip"></div>
    <div class="g1-active-area">
      <div class="g1-emoji-large" id="g1-emoji"></div>
      <div class="g1-blanks" id="g1-blanks"></div>
    </div>
    <div class="tip" style="margin-bottom:8px;font-size:0.82rem;">💡 Drag a tile onto a blank, or tap a tile then tap a blank!</div>
    <div class="g1-tray-label">Letter tiles</div>
    <div class="g1-tray" id="g1-tray"></div>
  `;
  g1RefreshStrip();
  g1RefreshActive();
  g1RefreshTray();
  speak(g1Words[0].word);
}

function g1RefreshStrip() {
  sharedRenderStrip(g1Words, g1ActiveIdx, 'g1-strip');
}

function g1RefreshActive() {
  const emojiEl = document.getElementById('g1-emoji');
  const blanksEl = document.getElementById('g1-blanks');
  if (!emojiEl || !blanksEl) return;
  const w = g1Words[g1ActiveIdx];
  emojiEl.textContent = w.emoji;
  emojiEl.onclick = () => speak(w.word);
  blanksEl.innerHTML = w.blanks.map((b, pos) =>
    `<div class="g1-blank${b.filled ? ' filled' : ''}" data-pos="${pos}">${b.filled ? b.letter : ''}</div>`
  ).join('');
  sharedWireBlanks(blanksEl, () => g1SelectedTile, g1TryPlace);
}

function g1RefreshTray() {
  sharedRenderTray(g1Tiles, () => g1SelectedTile, 'g1-tray', id => { g1SelectedTile = id; });
}

function g1TryPlace(tileId, pos) {
  g1SelectedTile = null;
  sharedTryPlace(tileId, pos, g1Tiles, g1Words[g1ActiveIdx].blanks, 'g1-tray', (tile, blank) => {
    tile.placed = true;
    blank.filled = true;
    g1RefreshActive();
    g1RefreshTray();
    const word = g1Words[g1ActiveIdx];
    if (word.blanks.every(b => b.filled)) {
      word.done = true;
      playChime(659, 0.35);
      setTimeout(() => { g1RefreshStrip(); g1Advance(); }, 550);
    }
  });
}

function g1Advance() {
  let next = g1Words.findIndex((w, i) => !w.done && i > g1ActiveIdx);
  if (next === -1) next = g1Words.findIndex(w => !w.done);
  if (next === -1) { g1Celebrate(); return; }
  g1ActiveIdx = next;
  g1RefreshStrip();
  g1RefreshActive();
  speak(g1Words[g1ActiveIdx].word);
}

function g1Celebrate() {
  const playEl = document.getElementById('g1-play');
  if (!playEl) return;
  playChime(784, 0.15);
  setTimeout(() => playChime(988, 0.15), 160);
  setTimeout(() => playChime(1175, 0.3), 300);
  const colors = ['#FFD54F','#9C27B0','#1565C0','#43A047','#E53935','#FF7043'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'g1-confetti-piece';
    p.style.cssText = `left:${Math.random()*100}vw;top:0;background:${colors[i % colors.length]};` +
      `width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;` +
      `animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 3500);
  }
  playEl.innerHTML = `
    <div class="g1-celebrate-card">
      <div style="font-size:4rem;margin-bottom:8px;">🎉</div>
      <div style="font-family:'Baloo 2',cursive;font-size:2rem;color:var(--plum);margin-bottom:6px;">Amazing!</div>
      <div style="font-family:'Baloo 2',cursive;font-size:1.1rem;color:#555;margin-bottom:20px;">
        You spelled all the words! Shabash! ⭐
      </div>
      <button class="next-btn" id="g1PlayAgain">🔄 Play Again!</button>
    </div>`;
  document.getElementById('g1PlayAgain').addEventListener('click', () => {
    const secEl = document.getElementById('sec-game1');
    startGame1(secEl, getSelectorWords(DATA.sections, secEl, 'g1'));
  });
}

// ── Game 3: Missing Letter ───────────────────────────────────────────────────

let g3Words = [];
let g3Tiles = [];
let g3ActiveIdx = 0;
let g3SelectedTile = null;
let g3TileCounter = 0;

function renderGame3Section(sections) {
  const div = document.createElement('div');
  div.id = 'sec-game3';
  div.className = 'section';
  div.innerHTML = `
    <button class="back-btn" id="g3BackBtn">← Games</button>
    <div class="section-title">✏️ Missing Letter</div>
    <div id="g3-setup">
      <div class="tip">🎮 Fill in the missing letters to complete each word!</div>
      ${buildSelectorHTML(sections, 'g3', { defaultCount: 5, minCount: 2, maxCount: 10, countLabel: 'Words per round:' })}
      <button class="next-btn" id="g3StartBtn" style="margin-top:14px;">▶️ Start Game!</button>
      <div id="g3SetupErr" class="ws-status"></div>
    </div>
    <div id="g3-play" style="display:none;"></div>
  `;
  setupSelector(div, 'g3');
  div.querySelector('#g3BackBtn').addEventListener('click', () => showGames());
  div.querySelector('#g3StartBtn').addEventListener('click', () => {
    const words = getSelectorWords(sections, div, 'g3');
    const err = div.querySelector('#g3SetupErr');
    if (!words.length) { err.textContent = 'No words found — try selecting more categories or levels!'; return; }
    err.textContent = '';
    startGame3(div, words);
  });
  return div;
}

function startGame3(containerEl, words) {
  g3TileCounter = 0;
  g3SelectedTile = null;
  g3ActiveIdx = 0;
  g3Words = words.map(({ word, emoji, level = 'easy' }) => {
    const blankPos = pickBlankPositions(word, level);
    return {
      word, emoji, level, done: false,
      blanks: word.toUpperCase().split('').map((ch, i) => ({
        letter: ch,
        filled: !blankPos.has(i),
        prefilled: !blankPos.has(i),
      })),
    };
  });
  g3Tiles = shuffle(
    g3Words.flatMap(w =>
      w.blanks.filter(b => !b.prefilled).map(b => ({ id: g3TileCounter++, letter: b.letter, placed: false }))
    )
  );

  containerEl.querySelector('#g3-setup').style.display = 'none';
  const playEl = containerEl.querySelector('#g3-play');
  playEl.style.display = 'block';
  playEl.innerHTML = `
    <div class="g1-progress-strip" id="g3-strip"></div>
    <div class="g1-active-area">
      <div class="g1-emoji-large" id="g3-emoji"></div>
      <div class="g1-blanks" id="g3-blanks"></div>
    </div>
    <div class="tip" style="margin-bottom:8px;font-size:0.82rem;">💡 Drag a tile onto a blank, or tap a tile then tap the blank!</div>
    <div class="g1-tray-label">Missing letters</div>
    <div class="g1-tray" id="g3-tray"></div>
  `;
  g3RefreshStrip();
  g3RefreshActive();
  g3RefreshTray();
  speak(g3Words[0].word);
}

function g3RefreshStrip() {
  sharedRenderStrip(g3Words, g3ActiveIdx, 'g3-strip');
}

function g3RefreshActive() {
  const emojiEl = document.getElementById('g3-emoji');
  const blanksEl = document.getElementById('g3-blanks');
  if (!emojiEl || !blanksEl) return;
  const w = g3Words[g3ActiveIdx];
  emojiEl.textContent = w.emoji;
  emojiEl.onclick = () => speak(w.word);
  blanksEl.innerHTML = w.blanks.map((b, pos) => {
    if (b.prefilled) return `<div class="g3-prefilled" data-pos="${pos}">${b.letter}</div>`;
    return `<div class="g1-blank${b.filled ? ' filled' : ''}" data-pos="${pos}">${b.filled ? b.letter : ''}</div>`;
  }).join('');
  sharedWireBlanks(blanksEl, () => g3SelectedTile, g3TryPlace);
}

function g3RefreshTray() {
  sharedRenderTray(g3Tiles, () => g3SelectedTile, 'g3-tray', id => { g3SelectedTile = id; });
}

function g3TryPlace(tileId, pos) {
  g3SelectedTile = null;
  sharedTryPlace(tileId, pos, g3Tiles, g3Words[g3ActiveIdx].blanks, 'g3-tray', (tile, blank) => {
    tile.placed = true;
    blank.filled = true;
    g3RefreshActive();
    g3RefreshTray();
    const word = g3Words[g3ActiveIdx];
    if (word.blanks.filter(b => !b.prefilled).every(b => b.filled)) {
      word.done = true;
      playChime(659, 0.35);
      setTimeout(() => { g3RefreshStrip(); g3Advance(); }, 550);
    }
  });
}

function g3Advance() {
  let next = g3Words.findIndex((w, i) => !w.done && i > g3ActiveIdx);
  if (next === -1) next = g3Words.findIndex(w => !w.done);
  if (next === -1) { g3Celebrate(); return; }
  g3ActiveIdx = next;
  g3RefreshStrip();
  g3RefreshActive();
  speak(g3Words[g3ActiveIdx].word);
}

function g3Celebrate() {
  const playEl = document.getElementById('g3-play');
  if (!playEl) return;
  playChime(784, 0.15);
  setTimeout(() => playChime(988, 0.15), 160);
  setTimeout(() => playChime(1175, 0.3), 300);
  const colors = ['#FFD54F','#9C27B0','#1565C0','#43A047','#E53935','#FF7043'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'g1-confetti-piece';
    p.style.cssText = `left:${Math.random()*100}vw;top:0;background:${colors[i % colors.length]};` +
      `width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;` +
      `animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 3500);
  }
  playEl.innerHTML = `
    <div class="g1-celebrate-card">
      <div style="font-size:4rem;margin-bottom:8px;">🎉</div>
      <div style="font-family:'Baloo 2',cursive;font-size:2rem;color:var(--plum);margin-bottom:6px;">Brilliant!</div>
      <div style="font-family:'Baloo 2',cursive;font-size:1.1rem;color:#555;margin-bottom:20px;">You found all the missing letters! Shabash! ⭐</div>
      <button class="next-btn" id="g3PlayAgain">🔄 Play Again!</button>
    </div>`;
  document.getElementById('g3PlayAgain').addEventListener('click', () => {
    const secEl = document.getElementById('sec-game3');
    startGame3(secEl, getSelectorWords(DATA.sections, secEl, 'g3'));
  });
}

// ── Init ────────────────────────────────────────────────────────────────────

async function init() {
  const res = await fetch('data/vowels.json');
  DATA = await res.json();

  const tabBar = document.getElementById('tabBar');
  const content = document.getElementById('content');

  DATA.sections.forEach((sec, i) => {
    const btn = document.createElement('button');
    btn.id = 'btn-' + sec.id;
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.style.background = sec.color;
    btn.textContent = sec.icon + ' ' + sec.title;
    btn.addEventListener('click', () => { lastLearnTab = sec.id; showTab(sec.id); });
    tabBar.appendChild(btn);

    let secEl;
    if (sec.items && sec.items[0] && sec.items[0].sound !== undefined) {
      secEl = renderTeamsSection(sec);
    } else {
      secEl = renderVowelSection(sec);
    }
    if (i === 0) secEl.classList.add('active');
    content.appendChild(secEl);
  });

  const gamesBtn = document.createElement('button');
  gamesBtn.id = 'btn-games';
  gamesBtn.className = 'tab-btn';
  gamesBtn.style.background = '#6A1B9A';
  gamesBtn.textContent = '🎮 Games';
  gamesBtn.addEventListener('click', () => showGames());
  tabBar.appendChild(gamesBtn);

  const wsBtn = document.createElement('button');
  wsBtn.id = 'btn-worksheet';
  wsBtn.className = 'tab-btn';
  wsBtn.style.background = '#2E7D32';
  wsBtn.textContent = 'Worksheet';
  wsBtn.addEventListener('click', () => showTab('worksheet'));
  tabBar.appendChild(wsBtn);

  content.appendChild(renderGamesSection());
  content.appendChild(renderQuizSection(buildQuizData(DATA.sections), DATA.sections));
  content.appendChild(renderGame1Section(DATA.sections));
  content.appendChild(renderGame2Section(DATA.sections));
  content.appendChild(renderGame3Section(DATA.sections));
  content.appendChild(renderWorksheetSection(DATA.sections));
}

init();
