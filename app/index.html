<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nyra Learns with Nana</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Baloo+2:wght@700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sun: #FFD54F;
    --plum: #9C27B0;
    --ink: #1A237E;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(180deg, #B3E5FC 0%, #E1F5FE 60%, #C8E6C9 100%);
    min-height: 100vh;
    color: var(--ink);
    padding-bottom: 40px;
  }

  header {
    background: linear-gradient(135deg, var(--plum), #1565C0);
    padding: 18px 20px 14px;
    text-align: center;
    border-bottom: 5px solid var(--sun);
  }

  header h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 2rem;
    color: white;
    text-shadow: 2px 3px 0 rgba(0,0,0,0.2);
    letter-spacing: 1px;
  }

  header p { color: #E3F2FD; font-size: 0.95rem; margin-top: 4px; }

  .tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 18px 16px 0;
    flex-wrap: wrap;
  }

  .tab-btn {
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    padding: 10px 20px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    font-weight: 700;
    color: white;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 0 rgba(0,0,0,0.2);
  }

  .tab-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }

  .tab-btn.active {
    transform: translateY(-3px) scale(1.06);
    box-shadow: 0 7px 0 rgba(0,0,0,0.2);
    outline: 3px solid var(--sun);
  }

  .section {
    display: none;
    padding: 20px 16px;
    max-width: 520px;
    margin: 0 auto;
    animation: popIn 0.3s ease;
  }
  .section.active { display: block; }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }

  .section-title {
    font-family: 'Baloo 2', cursive;
    font-size: 1.5rem;
    text-align: center;
    margin-bottom: 16px;
    color: var(--ink);
  }

  .tip {
    background: #E8F5E9;
    border-left: 4px solid #81C784;
    border-radius: 0 10px 10px 0;
    padding: 10px 14px;
    font-size: 0.88rem;
    color: #2E7D32;
    margin-bottom: 12px;
  }

  .rule-box {
    background: linear-gradient(135deg, #FFF9C4, #FFFDE7);
    border: 2px dashed #F9A825;
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 14px;
    font-size: 0.95rem;
    font-weight: 700;
    color: #5D4037;
  }

  /* Vowel grid */
  .vowel-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }

  .vowel-card {
    background: white;
    border-radius: 14px;
    padding: 10px 4px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.12);
    transition: transform 0.15s;
    border: 3px solid transparent;
  }
  .vowel-card:active { transform: scale(0.95); }
  .vowel-card .letter { font-family: 'Baloo 2', cursive; font-size: 2rem; line-height: 1; font-weight: 800; }
  .vowel-card .word   { font-size: 0.72rem; color: #555; margin-top: 3px; }

  /* Magic E demo */
  .magic-e-demo {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
    margin: 12px 0;
  }

  .word-transform {
    display: flex;
    align-items: center;
    gap: 8px;
    background: white;
    border-radius: 14px;
    padding: 10px 16px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    font-family: 'Baloo 2', cursive;
    font-size: 1.2rem;
    font-weight: 700;
  }

  .word-transform .arrow  { color: #999; }
  .word-transform .magic-e { font-size: 0.8em; vertical-align: super; }

  /* Word groups */
  .word-group {
    background: white;
    border-radius: 18px;
    padding: 14px 16px;
    margin-bottom: 14px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    border-left: 6px solid #ccc;
  }

  .word-group h3 { font-family: 'Baloo 2', cursive; font-size: 1.1rem; margin-bottom: 8px; color: var(--ink); }

  .word-chips { display: flex; flex-wrap: wrap; gap: 7px; }

  .chip {
    background: #F3F4FF;
    border-radius: 50px;
    padding: 5px 14px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    border: 2px solid #C5CAE9;
    transition: background 0.15s, transform 0.1s;
    user-select: none;
  }
  .chip:active { transform: scale(0.93); }
  .chip.tapped { background: var(--sun); border-color: #F57F17; }

  /* Vowel team groups */
  .team-group {
    background: white;
    border-radius: 18px;
    padding: 14px 16px;
    margin-bottom: 14px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  }

  .team-label {
    display: inline-block;
    color: white;
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    border-radius: 50px;
    padding: 3px 14px;
    margin-bottom: 8px;
    font-weight: 700;
  }

  .team-sound { font-size: 0.88rem; color: #777; margin-bottom: 8px; }

  /* Quiz */
  .quiz-card {
    background: white;
    border-radius: 20px;
    padding: 22px 18px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    margin-bottom: 16px;
  }

  .quiz-question { font-family: 'Baloo 2', cursive; font-size: 1.6rem; color: var(--ink); margin-bottom: 6px; }

  .quiz-word {
    font-family: 'Baloo 2', cursive;
    font-size: 3rem;
    color: var(--plum);
    margin: 8px 0 16px;
    letter-spacing: 4px;
  }

  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .quiz-btn {
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    padding: 12px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    font-weight: 700;
    color: white;
    background: #5C6BC0;
    box-shadow: 0 4px 0 #3949AB;
    transition: transform 0.1s;
  }
  .quiz-btn:active   { transform: translateY(2px); }
  .quiz-btn.correct  { background: #43A047; box-shadow: 0 4px 0 #2E7D32; }
  .quiz-btn.wrong    { background: #E53935; box-shadow: 0 4px 0 #B71C1C; }
  .quiz-btn:disabled { opacity: 0.7; cursor: default; }

  .quiz-result { font-family: 'Baloo 2', cursive; font-size: 1.4rem; margin-top: 14px; min-height: 40px; }

  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: white;
    border-radius: 14px;
    padding: 10px 16px;
    margin-bottom: 14px;
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .score-num { font-size: 1.8rem; color: var(--plum); }

  .next-btn {
    display: block;
    width: 100%;
    margin-top: 14px;
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    padding: 13px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    font-weight: 800;
    color: white;
    background: var(--plum);
    box-shadow: 0 5px 0 #6A1B9A;
    transition: transform 0.1s;
  }
  .next-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #6A1B9A; }

  .topic-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: white;
    border: 3px solid #ccc;
    border-radius: 16px;
    padding: 14px 16px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    user-select: none;
  }
  .topic-card:has(input:checked) { background: #F3F4FF; }
  .topic-card:active { transform: scale(0.98); }
  .topic-card input[type=checkbox] { width: 22px; height: 22px; accent-color: var(--plum); cursor: pointer; flex-shrink: 0; }
  .topic-icon { font-size: 1.5rem; }
  .topic-name { font-family: 'Baloo 2', cursive; font-size: 1.1rem; font-weight: 700; color: var(--ink); flex: 1; }
  .topic-eg   { font-size: 0.78rem; color: #888; }

  /* Worksheet */
  .ws-section-box {
    background: white;
    border-radius: 18px;
    margin-bottom: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    overflow: hidden;
  }

  .ws-section-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
  }

  .ws-sec-check-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    cursor: pointer;
    user-select: none;
  }

  .ws-sec-check-wrap input[type=checkbox] {
    width: 20px; height: 20px;
    accent-color: var(--plum);
    cursor: pointer;
    flex-shrink: 0;
  }

  .ws-color-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .ws-section-name {
    font-family: 'Baloo 2', cursive;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--ink);
  }

  .ws-expand-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    color: #aaa;
    padding: 4px 8px;
    line-height: 1;
    transition: transform 0.2s;
  }

  .ws-expand-btn.open { transform: rotate(90deg); }

  .ws-items-list {
    padding: 6px 16px 12px 48px;
    border-top: 1px solid #f0f0f0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .ws-items-list[hidden] { display: none; }

  .ws-item-label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 0.92rem;
    font-weight: 600;
    color: #555;
    user-select: none;
  }

  .ws-item-label input[type=checkbox] {
    width: 17px; height: 17px;
    accent-color: var(--plum);
    cursor: pointer;
  }

  .ws-count-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: white;
    border-radius: 14px;
    padding: 12px 16px;
    margin: 14px 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
  }

  .ws-count-row input[type=number] {
    width: 68px;
    padding: 6px 8px;
    border: 2px solid #C5CAE9;
    border-radius: 10px;
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--ink);
    text-align: center;
  }

  .ws-status {
    text-align: center;
    font-family: 'Baloo 2', cursive;
    font-size: 0.95rem;
    font-weight: 700;
    margin-top: 10px;
    min-height: 22px;
    color: #E53935;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<header>
  <h1>🌟 Nyra Learns with Nana</h1>
  <p>Tap to learn A, E, I, O, U together! 🎉</p>
</header>

<div class="tabs" id="tabBar"></div>
<div id="content"></div>

<script>
let DATA = null;
let currentQ = 0, score = 0, total = 0, answered = false, shuffledQuiz = [];

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.8; u.pitch = 1.2;
  window.speechSynthesis.speak(u);
}

function tapChip(el, word) {
  el.classList.toggle('tapped');
  speak(word);
}

function showTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const sec = document.getElementById('sec-' + id);
  if (sec) sec.classList.add('active');
  const btn = document.getElementById('btn-' + id);
  if (btn) btn.classList.add('active');
}

function renderVowelSection(sec) {
  const div = document.createElement('div');
  div.id = 'sec-' + sec.id;
  div.className = 'section';

  let html = `<div class="section-title">${sec.icon} ${sec.title}</div>`;

  if (sec.tip) html += `<div class="tip">📣 ${sec.tip}</div>`;

  if (sec.vowels) {
    html += `<div class="vowel-grid">`;
    for (const v of sec.vowels) {
      html += `<div class="vowel-card" onclick="speak('${v.speak}')">
        <div class="letter" style="color:${sec.color}">${v.letter}</div>
        <div class="word">${v.example}</div>
      </div>`;
    }
    html += `</div>`;
  }

  if (sec.rule) html += `<div class="rule-box"><span>✨</span> ${sec.rule}</div>`;

  if (sec.transforms) {
    html += `<div class="magic-e-demo">`;
    for (const t of sec.transforms) {
      const base = t.after.slice(0, -1);
      html += `<div class="word-transform">
        <span style="color:${DATA.sections[0].color}">${t.before}</span>
        <span class="arrow">→</span>
        <span style="color:${sec.color}">${base}<span class="magic-e" style="color:#F06292">e</span></span>
      </div>`;
    }
    html += `</div>`;
  }

  for (const item of sec.items) {
    html += `<div class="word-group" style="border-left-color:${sec.color}">
      <h3>${item.icon || ''} ${item.label}</h3>
      <div class="word-chips">`;
    for (const w of item.words) {
      html += `<span class="chip" onclick="tapChip(this,'${w}')">${w}</span>`;
    }
    html += `</div></div>`;
  }

  div.innerHTML = html;
  return div;
}

function renderTeamsSection(sec) {
  const div = document.createElement('div');
  div.id = 'sec-' + sec.id;
  div.className = 'section';

  let html = `<div class="section-title">${sec.icon} ${sec.title}</div>`;
  if (sec.tip) html += `<div class="tip">🤝 ${sec.tip}</div>`;

  for (const item of sec.items) {
    html += `<div class="team-group">
      <div class="team-label" style="background:${sec.color}">${item.label}</div>
      <div class="team-sound">👉 ${item.sound}</div>
      <div class="word-chips">`;
    for (const w of item.words) {
      html += `<span class="chip" onclick="tapChip(this,'${w}')">${w}</span>`;
    }
    html += `</div></div>`;
  }

  div.innerHTML = html;
  return div;
}

function renderQuizSection(quizData, sections) {
  const div = document.createElement('div');
  div.id = 'sec-quiz';
  div.className = 'section';

  const topicOptions = sections.map(s => ({
    id: s.id,
    icon: s.icon,
    title: s.title,
    color: s.color,
    eg: s.items.slice(0, 3).flatMap(i => i.words.slice(0, 2)).join(', ')
  }));

  let html = `<div class="section-title">⭐ Quiz Time!</div>
  <div id="quizSetup">
    <div class="tip">👆 Pick what you want to practice today!</div>
    <div style="display:grid;gap:10px;margin-bottom:16px;">`;

  for (const t of topicOptions) {
    const topicKey = t.id === 'short-vowels' ? 'short' : t.id === 'long-vowels' ? 'long' : 'double';
    html += `<label class="topic-card" style="border-color:${t.color}">
      <input type="checkbox" value="${topicKey}" checked>
      <span class="topic-icon">${t.icon}</span>
      <span class="topic-name">${t.title}</span>
      <span class="topic-eg">${t.eg}</span>
    </label>`;
  }

  html += `</div>
    <button class="next-btn" id="startQuizBtn">▶️ Start Quiz!</button>
    <div id="topicWarning" style="color:#E53935;font-weight:700;text-align:center;margin-top:8px;display:none;">Please pick at least one topic! 🙏</div>
  </div>

  <div id="quizPlay" style="display:none;">
    <div class="score-bar">
      <span>⭐ Score</span>
      <span class="score-num" id="scoreDisplay">0</span>
      <span>/ <span id="totalDisplay">0</span></span>
      <button id="changeTopicsBtn" style="font-family:'Baloo 2',cursive;background:#90CAF9;border:none;padding:6px 12px;border-radius:20px;cursor:pointer;font-weight:700;">⬅️ Change</button>
    </div>
    <div class="quiz-card">
      <div class="quiz-question">What kind of vowel does this word have?</div>
      <div class="quiz-word" id="quizWord"></div>
      <div class="quiz-options" id="quizOptions"></div>
      <div class="quiz-result" id="quizResult"></div>
    </div>
    <button class="next-btn" id="nextQuizBtn">Next Word ➡️</button>
  </div>`;

  div.innerHTML = html;

  div.querySelector('#startQuizBtn').addEventListener('click', () => startQuiz(quizData));
  div.querySelector('#changeTopicsBtn').addEventListener('click', backToSetup);
  div.querySelector('#nextQuizBtn').addEventListener('click', nextQuestion);

  return div;
}

function shuffle(arr) { return arr.slice().sort(() => Math.random() - 0.5); }

function getSelectedTopics() {
  return Array.from(document.querySelectorAll('#quizSetup input[type=checkbox]:checked')).map(cb => cb.value);
}

function startQuiz(quizData) {
  const topics = getSelectedTopics();
  if (topics.length === 0) {
    document.getElementById('topicWarning').style.display = 'block';
    return;
  }
  document.getElementById('topicWarning').style.display = 'none';
  shuffledQuiz = shuffle(quizData.filter(q => topics.includes(q.topic)));
  currentQ = 0; score = 0; total = 0; answered = false;
  updateScore();
  document.getElementById('quizSetup').style.display = 'none';
  document.getElementById('quizPlay').style.display = 'block';
  renderQuestion();
}

function backToSetup() {
  document.getElementById('quizSetup').style.display = 'block';
  document.getElementById('quizPlay').style.display = 'none';
}

function renderQuestion() {
  if (currentQ >= shuffledQuiz.length) currentQ = 0;
  const q = shuffledQuiz[currentQ];
  document.getElementById('quizWord').textContent = q.word;
  document.getElementById('quizResult').textContent = '';
  speak(q.word);
  answered = false;

  const container = document.getElementById('quizOptions');
  container.innerHTML = '';
  shuffle(q.options).forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => checkAnswer(btn, opt, q.answer, container));
    container.appendChild(btn);
  });
}

function checkAnswer(btn, chosen, correct, container) {
  if (answered) return;
  answered = true;
  total++;
  container.querySelectorAll('.quiz-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
  });
  const result = document.getElementById('quizResult');
  if (chosen === correct) {
    score++;
    btn.classList.add('correct');
    result.textContent = '🎉 Wah, correct! Shabash! 🌟';
    speak('Correct! Great job!');
  } else {
    btn.classList.add('wrong');
    result.textContent = 'Oops! It is ' + correct + '. Try again!';
    speak('The answer is ' + correct);
  }
  updateScore();
}

function nextQuestion() { currentQ++; renderQuestion(); }

function updateScore() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('totalDisplay').textContent = total;
}

function renderWorksheetSection(sections) {
  const div = document.createElement('div');
  div.id = 'sec-worksheet';
  div.className = 'section';

  let html = `<div class="section-title">Worksheet Generator</div>
  <div class="tip">&#128221; Pick categories, set word count, then download your PDF!</div>
  <div id="wsCategories">`;

  for (const sec of sections) {
    html += `<div class="ws-section-box">
      <div class="ws-section-header">
        <label class="ws-sec-check-wrap">
          <input type="checkbox" class="ws-sec-cb" data-sec="${sec.id}" checked>
          <span class="ws-color-dot" style="background:${sec.color}"></span>
          <span class="ws-section-name">${sec.title}</span>
        </label>
        <button class="ws-expand-btn" data-sec="${sec.id}" type="button">&#9654;</button>
      </div>
      <div class="ws-items-list" id="wsItems-${sec.id}" hidden>`;

    for (const item of sec.items) {
      html += `<label class="ws-item-label">
          <input type="checkbox" class="ws-item-cb" data-sec="${sec.id}" data-item="${item.id}" checked>
          ${item.label}
        </label>`;
    }
    html += `</div></div>`;
  }

  html += `</div>
  <div class="ws-count-row">
    <span>Words per category:</span>
    <input type="number" id="wsWordCount" value="25" min="1" max="200">
  </div>
  <button class="next-btn" id="wsGenerateBtn" type="button">&#128196; Download PDF</button>
  <div class="ws-status" id="wsStatus"></div>`;

  div.innerHTML = html;

  div.querySelectorAll('.ws-expand-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const itemsList = document.getElementById('wsItems-' + btn.dataset.sec);
      const opening = itemsList.hidden;
      itemsList.hidden = !opening;
      btn.classList.toggle('open', opening);
    });
  });

  div.querySelectorAll('.ws-sec-cb').forEach(cb => {
    cb.addEventListener('change', () => {
      div.querySelectorAll(`.ws-item-cb[data-sec="${cb.dataset.sec}"]`).forEach(icb => {
        icb.checked = cb.checked;
      });
    });
  });

  div.querySelector('#wsGenerateBtn').addEventListener('click', () => generateWorksheetPDF(sections));

  return div;
}

function generateWorksheetPDF(sections) {
  const statusEl = document.getElementById('wsStatus');
  if (!window.jspdf) {
    statusEl.textContent = 'PDF library not loaded — please try again in a moment.';
    return;
  }
  statusEl.textContent = '';

  const wordCount = Math.max(1, parseInt(document.getElementById('wsWordCount').value, 10) || 25);

  const selectedSections = [];
  for (const sec of sections) {
    const checkedItems = Array.from(
      document.querySelectorAll(`.ws-item-cb[data-sec="${sec.id}"]:checked`)
    ).map(cb => cb.dataset.item);
    if (checkedItems.length === 0) continue;

    let words = [];
    for (const item of sec.items) {
      if (checkedItems.includes(item.id)) words.push(...item.words);
    }
    if (words.length === 0) continue;

    words = shuffle(words).slice(0, wordCount);
    selectedSections.push({ sec, words });
  }

  if (selectedSections.length === 0) {
    statusEl.textContent = 'Please select at least one category!';
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'letter', orientation: 'portrait' });

  const pageW = 215.9, pageH = 279.4;
  const mL = 15, mT = 20, mB = 15;
  const workW = pageW - mL * 2;
  const cols = 4;
  const gapX = 3;
  const cellW = (workW - gapX * (cols - 1)) / cols;
  const cellH = 18;
  const gapY = 3;
  const hdrH = 9;

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(16);
  doc.text("Nyra's Spelling Worksheet", pageW / 2, mT, { align: 'center' });

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  const today = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  doc.text(today, pageW / 2, mT + 6, { align: 'center' });

  doc.setFontSize(9);
  doc.setTextColor(130, 130, 130);
  doc.text('Name: _________________________', mL, mT + 13);
  doc.setTextColor(0, 0, 0);

  let y = mT + 20;

  for (const { sec, words } of selectedSections) {
    const hex = sec.color;
    const rr = parseInt(hex.slice(1, 3), 16);
    const gg = parseInt(hex.slice(3, 5), 16);
    const bb = parseInt(hex.slice(5, 7), 16);

    if (y + hdrH + cellH + gapY > pageH - mB) {
      doc.addPage();
      y = mT;
    }

    doc.setFillColor(rr, gg, bb);
    doc.roundedRect(mL, y, workW, hdrH, 2, 2, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    doc.text(sec.title, mL + 4, y + hdrH * 0.68);
    doc.setTextColor(0, 0, 0);
    y += hdrH + 2;

    const rowCount = Math.ceil(words.length / cols);
    for (let row = 0; row < rowCount; row++) {
      if (y + cellH > pageH - mB) {
        doc.addPage();
        y = mT;
      }
      for (let col = 0; col < cols; col++) {
        const idx = row * cols + col;
        if (idx >= words.length) break;
        const x = mL + col * (cellW + gapX);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(11);
        doc.setTextColor(20, 20, 20);
        doc.text(words[idx], x + 2, y + 7);
        doc.setDrawColor(185, 185, 185);
        doc.setLineWidth(0.3);
        doc.line(x + 2, y + 14, x + cellW - 2, y + 14);
      }
      y += cellH + gapY;
    }
    y += 5;
  }

  const dateStr = new Date().toISOString().slice(0, 10);
  doc.save(`Nyra-Worksheet-${dateStr}.pdf`);
}

async function init() {
  const res = await fetch('data/vowels.json');
  DATA = await res.json();

  const tabBar = document.getElementById('tabBar');
  const content = document.getElementById('content');

  DATA.sections.forEach((sec, i) => {
    const btn = document.createElement('button');
    btn.id = 'btn-' + sec.id;
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.style.background = sec.color;
    btn.textContent = sec.icon + ' ' + sec.title;
    btn.addEventListener('click', () => showTab(sec.id));
    tabBar.appendChild(btn);

    let secEl;
    if (sec.id === 'vowel-teams') {
      secEl = renderTeamsSection(sec);
    } else {
      secEl = renderVowelSection(sec);
    }
    if (i === 0) secEl.classList.add('active');
    content.appendChild(secEl);
  });

  const quizBtn = document.createElement('button');
  quizBtn.id = 'btn-quiz';
  quizBtn.className = 'tab-btn';
  quizBtn.style.background = '#E65100';
  quizBtn.textContent = '⭐ Quiz!';
  quizBtn.addEventListener('click', () => showTab('quiz'));
  tabBar.appendChild(quizBtn);

  content.appendChild(renderQuizSection(DATA.quiz, DATA.sections));

  const wsBtn = document.createElement('button');
  wsBtn.id = 'btn-worksheet';
  wsBtn.className = 'tab-btn';
  wsBtn.style.background = '#2E7D32';
  wsBtn.textContent = 'Worksheet';
  wsBtn.addEventListener('click', () => showTab('worksheet'));
  tabBar.appendChild(wsBtn);

  content.appendChild(renderWorksheetSection(DATA.sections));
}

init();
</script>
</body>
</html>
